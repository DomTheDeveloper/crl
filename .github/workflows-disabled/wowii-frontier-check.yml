name: WOWII Frontier Lean Check

on:
  pull_request:
    paths:
      - '.github/workflows/wowii-frontier-check.yml'
  workflow_dispatch:

jobs:
  frontier:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Checkout exact proof source
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/test-expo-app
          ref: cd22ba4a996a6660c0ddf6d9deeb806328ab12f3
          path: campaign-source

      - name: Checkout pinned Formal Conjectures
        uses: actions/checkout@v4
        with:
          repository: google-deepmind/formal-conjectures
          ref: b2e608fc52d765510915a244bb69b1a2741acc3c
          path: formal-conjectures

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: formal-conjectures/.lake/build
          key: wowii-formal-conjectures-${{ runner.os }}-${{ hashFiles('formal-conjectures/lean-toolchain', 'formal-conjectures/lake-manifest.json') }}

      - name: Download Mathlib cache
        working-directory: formal-conjectures
        run: lake exe cache get

      - name: Build upstream modules
        working-directory: formal-conjectures
        run: |
          lake build \
            FormalConjectures.WrittenOnTheWallII.GraphConjecture143 \
            FormalConjectures.WrittenOnTheWallII.GraphConjecture314

      - name: Compile frontier modules
        working-directory: formal-conjectures
        shell: bash
        run: |
          set +e
          set -uo pipefail
          rm -rf WOWII
          cp -R ../campaign-source/WOWII WOWII
          export LEAN_PATH="$PWD:${LEAN_PATH:-}"
          : > wowii-frontier.log
          status=0
          files=(
            WOWII/GraphConjecture143Proof.lean
            WOWII/ZZGraphConjecture314Core.lean
            WOWII/ZZGraphConjecture314DominatingEdge.lean
            WOWII/ZZGraphConjecture314CardinalityReduction.lean
            WOWII/ZZGraphConjecture314MinimalTDSStructure.lean
            WOWII/ZZGraphConjecture314SelectedDegree.lean
            WOWII/ZZGraphConjecture314NoC4.lean
            WOWII/ZZGraphConjecture314BipartiteCommon.lean
            WOWII/ZZGraphConjecture314ChainGraph.lean
            WOWII/ZZGraphConjecture314P5Bridge.lean
            WOWII/ZZGraphConjecture314FinalReduction.lean
          )
          for f in "${files[@]}"; do
            echo "=== Checking $f ===" | tee -a wowii-frontier.log
            lake env lean -o "${f%.lean}.olean" "$f" 2>&1 | tee -a wowii-frontier.log
            code=${PIPESTATUS[0]}
            if [ "$code" -ne 0 ]; then status=$code; fi
          done
          exit "$status"

      - name: Upload frontier log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-frontier-log
          path: formal-conjectures/wowii-frontier.log
          retention-days: 7
