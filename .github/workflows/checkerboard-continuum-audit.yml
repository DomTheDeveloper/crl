name: Checkerboard exact continuum optimum audit

on:
  push:
    branches:
      - audit/checkerboard-continuum-core
    paths:
      - '.github/workflows/checkerboard-continuum-audit.yml'
      - 'proofs/lean/Checkerboard/**'
      - 'scripts/checkerboard/**'
  pull_request:
    paths:
      - '.github/workflows/checkerboard-continuum-audit.yml'
      - 'proofs/lean/Checkerboard/**'
      - 'scripts/checkerboard/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checkerboard-continuum-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Recover and repair generated Handelman Lean source
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/checkerboard/repair_handelman_certificate.py \
            2>&1 | tee proofs/lean/Checkerboard/handelman-repair.log
          test -s proofs/lean/Checkerboard/Checkerboard/LP/DualHandelmanData.lean
          grep -q '^coefficients=91$' proofs/lean/Checkerboard/handelman-repair.txt
          grep -q '^cell_theorems=24$' proofs/lean/Checkerboard/handelman-repair.txt
      - name: Generate remaining exact certificate modules
        shell: bash
        run: |
          set -euo pipefail
          : > proofs/lean/Checkerboard/generation.log
          python3 -m pip install --user sympy 2>&1 | tee -a proofs/lean/Checkerboard/generation.log
          for script in \
            generate_outer_certificate.py \
            generate_outer_density_certificate.py \
            generate_outer_support_certificate.py \
            generate_outer_geometry_certificate.py \
            generate_outer_marginal_ae_certificate.py \
            generate_outer_projection_ae_certificate.py \
            generate_outer_measure_certificate.py \
            generate_dual_bernstein_certificate.py \
            generate_dual_function_identities.py
          do
            echo "=== $script ===" | tee -a proofs/lean/Checkerboard/generation.log
            python3 "scripts/checkerboard/$script" 2>&1 | tee -a proofs/lean/Checkerboard/generation.log
          done
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve Mathlib and cache
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -euo pipefail
          lake update
          lake exe cache get
      - name: Build exact continuum primal-dual stack
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -o pipefail
          lake build Checkerboard.LP.ContinuumOptimum 2>&1 | tee continuum-audit.log
      - name: Audit exact theorem heads
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/CheckerboardContinuumAxioms.lean <<'EOF'
          import Checkerboard.LP.ContinuumOptimum
          #print axioms Checkerboard.checkerboardContinuumPrimal_feasible
          #print axioms Checkerboard.checkerboardContinuumPrimal_value
          #print axioms Checkerboard.certifiedDual_feasible
          #print axioms Checkerboard.certifiedDual_value
          #print axioms Checkerboard.checkerboard_continuum_strong_duality
          EOF
          lake env lean /tmp/CheckerboardContinuumAxioms.lean 2>&1 | tee -a continuum-audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' continuum-audit.log; then
            exit 1
          fi
      - name: Reject unfinished proof markers in continuum core
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          ! grep -RnE '\bsorry\b|\badmit\b|native_decide' --include='*.lean' \
            Checkerboard/LP/ContinuumModel.lean \
            Checkerboard/LP/DualHandelmanData.lean \
            Checkerboard/LP/ContinuumPrimalCertificate.lean \
            Checkerboard/LP/ContinuumDualCertificate.lean \
            Checkerboard/LP/ContinuumOptimum.lean
      - name: Upload transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-continuum-audit
          path: |
            proofs/lean/Checkerboard/handelman-repair.txt
            proofs/lean/Checkerboard/handelman-repair.log
            proofs/lean/Checkerboard/generation.log
            proofs/lean/Checkerboard/continuum-audit.log
          if-no-files-found: warn
