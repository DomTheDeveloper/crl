name: Checkerboard exact continuum optimum audit

on:
  push:
    branches:
      - audit/checkerboard-continuum-core
    paths:
      - '.github/workflows/checkerboard-continuum-audit.yml'
      - 'proofs/lean/Checkerboard/**'
  pull_request:
    paths:
      - '.github/workflows/checkerboard-continuum-audit.yml'
      - 'proofs/lean/Checkerboard/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checkerboard-continuum-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Recover exact Handelman source from Git history
        id: recover
        shell: bash
        run: |
          set +e
          mkdir -p proofs/lean/Checkerboard
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune \
            > proofs/lean/Checkerboard/handelman-recovery.log 2>&1
          fetch_code=$?
          if [[ "$fetch_code" != 0 ]]; then
            echo "git fetch failed: $fetch_code" >> proofs/lean/Checkerboard/handelman-recovery.log
            echo "exit_code=$fetch_code" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - <<'PY' >> proofs/lean/Checkerboard/handelman-recovery.log 2>&1
          from __future__ import annotations
          import base64, gzip, hashlib, itertools, subprocess
          from pathlib import Path

          output_path = 'proofs/lean/Checkerboard/Checkerboard/LP/DualHandelmanData.lean'
          expected_sha = '258056bf2cded9ea19b5419f4f3a837e6476373d7594b4158b7d54accba0febf'
          expected_lines = 10589

          def accept(source: bytes, label: str) -> bool:
              try:
                  text = source.decode('utf-8')
              except UnicodeDecodeError:
                  return False
              digest = hashlib.sha256(source).hexdigest()
              line_count = len(text.splitlines())
              print(f'candidate {label}: sha256={digest} lines={line_count}')
              if digest != expected_sha or line_count != expected_lines:
                  return False
              output = Path(output_path)
              output.parent.mkdir(parents=True, exist_ok=True)
              output.write_bytes(source)
              Path('proofs/lean/Checkerboard/handelman-recovery.txt').write_text(
                  f'source={label}\nsha256={digest}\nlines={line_count}\n'
              )
              return True

          # Prefer an exact historical generated Lean module when one exists.
          commits = subprocess.check_output(
              ['git', 'log', '--all', '--format=%H', '--', output_path], text=True
          ).split()
          print('historical generated-module commits:', len(commits))
          seen_blobs = set()
          for commit in commits:
              try:
                  source = subprocess.check_output(
                      ['git', 'show', f'{commit}:{output_path}'],
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  continue
              key = hashlib.sha256(source).hexdigest()
              if key in seen_blobs:
                  continue
              seen_blobs.add(key)
              if accept(source, f'git:{commit}:{output_path}'):
                  raise SystemExit(0)

          paths = [
              'math/checkerboard/lp/certificates/dual_handelman_payload_0.txt',
              'math/checkerboard/lp/certificates/dual_handelman_payload_1.txt',
              'math/checkerboard/lp/certificates/dual_handelman_payload_2.txt',
          ]
          versions = []
          for path in paths:
              commits = subprocess.check_output(
                  ['git', 'log', '--all', '--format=%H', '--', path], text=True
              ).split()
              seen = set()
              entries = []
              for commit in commits:
                  try:
                      data = subprocess.check_output(
                          ['git', 'show', f'{commit}:{path}'], text=True,
                          stderr=subprocess.DEVNULL,
                      ).strip()
                  except subprocess.CalledProcessError:
                      continue
                  key = hashlib.sha256(data.encode('ascii')).hexdigest()
                  if key not in seen:
                      seen.add(key)
                      entries.append((commit, key, data))
              print(path, 'unique versions:', len(entries))
              if not entries:
                  raise SystemExit(f'no historical versions found for {path}')
              versions.append(entries)

          attempts = 0
          for combo in itertools.product(*versions):
              attempts += 1
              encoded = ''.join(entry[2] for entry in combo)
              try:
                  source = gzip.decompress(base64.b64decode(encoded, validate=False))
              except Exception as exc:
                  if attempts <= 10:
                      print(f'payload attempt {attempts} failed: {type(exc).__name__}: {exc}')
                  continue
              label = 'payloads:' + ','.join(entry[0] for entry in combo)
              if accept(source, label):
                  Path('proofs/lean/Checkerboard/handelman-recovery.txt').write_text(
                      Path('proofs/lean/Checkerboard/handelman-recovery.txt').read_text() +
                      f'attempts={attempts}\n' +
                      '\n'.join(
                          f'{paths[i]} commit={entry[0]} blob_sha256={entry[1]}'
                          for i, entry in enumerate(combo)
                      ) + '\n'
                  )
                  raise SystemExit(0)
          raise SystemExit(f'no exact historical source found after {attempts} payload combinations')
          PY
          code=$?
          tail -n 200 proofs/lean/Checkerboard/handelman-recovery.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Enforce exact Handelman recovery
        shell: bash
        run: |
          test '${{ steps.recover.outputs.exit_code }}' = '0'
          test -s proofs/lean/Checkerboard/Checkerboard/LP/DualHandelmanData.lean
          grep -q 'sha256=258056bf2cded9ea19b5419f4f3a837e6476373d7594b4158b7d54accba0febf' \
            proofs/lean/Checkerboard/handelman-recovery.txt
      - name: Generate remaining exact certificate modules
        shell: bash
        run: |
          set -euo pipefail
          : > proofs/lean/Checkerboard/generation.log
          python -m pip install sympy 2>&1 | tee -a proofs/lean/Checkerboard/generation.log
          for script in \
            generate_outer_certificate.py \
            generate_outer_density_certificate.py \
            generate_outer_support_certificate.py \
            generate_outer_geometry_certificate.py \
            generate_outer_marginal_ae_certificate.py \
            generate_outer_projection_ae_certificate.py \
            generate_outer_measure_certificate.py \
            generate_dual_bernstein_certificate.py \
            generate_dual_function_identities.py
          do
            echo "=== $script ===" | tee -a proofs/lean/Checkerboard/generation.log
            python "scripts/checkerboard/$script" 2>&1 | tee -a proofs/lean/Checkerboard/generation.log
          done
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve Mathlib and cache
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -euo pipefail
          lake update
          lake exe cache get
      - name: Build exact continuum primal-dual stack
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -euo pipefail
          lake build Checkerboard.LP.ContinuumOptimum 2>&1 | tee continuum-audit.log
      - name: Audit exact theorem heads
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/CheckerboardContinuumAxioms.lean <<'EOF'
          import Checkerboard.LP.ContinuumOptimum
          #print axioms Checkerboard.checkerboardContinuumPrimal_feasible
          #print axioms Checkerboard.checkerboardContinuumPrimal_value
          #print axioms Checkerboard.certifiedDual_feasible
          #print axioms Checkerboard.certifiedDual_value
          #print axioms Checkerboard.checkerboard_continuum_strong_duality
          EOF
          lake env lean /tmp/CheckerboardContinuumAxioms.lean 2>&1 | tee -a continuum-audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' continuum-audit.log; then
            exit 1
          fi
      - name: Reject unfinished proof markers in continuum core
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          ! grep -RnE '\bsorry\b|\badmit\b|native_decide' --include='*.lean' \
            Checkerboard/LP/ContinuumModel.lean \
            Checkerboard/LP/ContinuumPrimalCertificate.lean \
            Checkerboard/LP/ContinuumDualCertificate.lean \
            Checkerboard/LP/ContinuumOptimum.lean
      - name: Upload transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-continuum-audit
          path: |
            proofs/lean/Checkerboard/handelman-recovery.txt
            proofs/lean/Checkerboard/handelman-recovery.log
            proofs/lean/Checkerboard/generation.log
            proofs/lean/Checkerboard/continuum-audit.log
          if-no-files-found: warn
