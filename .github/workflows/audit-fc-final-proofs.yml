name: Audit WOWII 109 proof

on:
  pull_request:
    paths:
      - '.github/workflows/audit-fc-final-proofs.yml'

permissions:
  contents: read

concurrency:
  group: audit-fc-final-proofs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify WOWII 109
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out exact proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: cf59008ef1cd432bf9803275dcf5d62ab1f094a3
          path: formal-conjectures

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download Mathlib cache
        shell: bash
        working-directory: formal-conjectures
        run: lake exe cache get

      - name: Build exact proof module
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture109 \
            2>&1 | tee ../proof-build.log

      - name: Audit theorem axioms
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          cat > AuditFinal.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture109
          #print axioms WrittenOnTheWallII.GraphConjecture109.conjecture109
          EOF
          lake env lean AuditFinal.lean 2>&1 | tee ../proof-axioms.log
          if grep -q sorryAx ../proof-axioms.log; then
            echo "conjecture109 depends on sorryAx" >&2
            exit 1
          fi
          grep -F "WrittenOnTheWallII.GraphConjecture109.conjecture109" ../proof-axioms.log

      - name: Reject proof holes and unsafe shortcuts
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          PROOF_FILE=FormalConjectures/WrittenOnTheWallII/GraphConjecture109.lean
          if grep -InE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|^[[:space:]]*opaque[[:space:]]' "$PROOF_FILE"; then
            exit 1
          fi

      - name: Upload verification transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WOWII-109-audit
          path: |
            proof-build.log
            proof-axioms.log
          if-no-files-found: warn
