name: Verify Erdős 741 partition strengthening

on:
  push:
    paths:
      - "proofs/lean/Erdos741Finite/**"
      - ".github/workflows/verify-erdos741-finite.yml"
  pull_request:
    paths:
      - "proofs/lean/Erdos741Finite/**"
      - ".github/workflows/verify-erdos741-finite.yml"
  workflow_dispatch:

jobs:
  lean-erdos741-partitions:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Reject placeholders and custom axioms
        run: |
          ! grep -RnE '\bsorry\b|\badmit\b|native_decide|^[[:space:]]*(axiom|opaque)[[:space:]]' \
            proofs/lean/Erdos741Finite/Erdos741Finite.lean

      - name: Resolve pinned dependencies
        working-directory: proofs/lean/Erdos741Finite
        run: lake update

      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Erdos741Finite
        run: lake exe cache get || echo "cache miss — dependencies will build normally"

      - name: Build and kernel-check
        working-directory: proofs/lean/Erdos741Finite
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log

      - name: Assert clean axiom footprint
        working-directory: proofs/lean/Erdos741Finite
        run: |
          cat build.log
          if grep -q 'sorryAx' build.log; then
            echo '::error::Proof depends on sorryAx'
            exit 1
          fi
          grep -q 'exists_basis_with_at_most_one_syndetic_cell' build.log
          grep -iE 'axioms|propext|Classical.choice|Quot.sound' build.log || true

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erdos741-partitions-kernel-audit
          path: proofs/lean/Erdos741Finite/build.log
          if-no-files-found: warn
          retention-days: 30
