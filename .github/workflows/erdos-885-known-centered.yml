name: Erdős 885 known-centered mod-sixteen lift

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_known_centered_lift.py'
      - '.github/workflows/erdos-885-known-centered.yml'
  workflow_dispatch:

concurrency:
  group: erdos-885-known-centered-mod16
  cancel-in-progress: true

jobs:
  lift:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Lift exact known mod-eight parents to mod sixteen
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/work" -w /work sagemath/sagemath:latest \
            sage -python research/erdos885/sage_known_centered_lift.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-known-centered-mod16
          path: results/known_centered_mod16.json
          if-no-files-found: warn
