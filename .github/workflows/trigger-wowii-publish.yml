name: Trigger WOWII Pages publication

on:
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    if: github.event.pull_request.head.ref == 'trigger-wowii-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch and watch publication workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run publish-wowii-pages.yml \
            --repo DomTheDeveloper/crl \
            --ref claude/gracious-hamilton-8k6xhz
          sleep 8
          RUN_ID="$(gh run list \
            --repo DomTheDeveloper/crl \
            --workflow publish-wowii-pages.yml \
            --branch claude/gracious-hamilton-8k6xhz \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"
          echo "Watching publication run ${RUN_ID}"
          gh run watch "$RUN_ID" --repo DomTheDeveloper/crl --exit-status
