name: Bernstein all-three physical audit

# Exact terminal-head Windows audit child.
on:
  pull_request:
    paths:
      - '.github/workflows/bernstein-all-three-physical-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Reject holes and unsafe shortcuts
        shell: bash
        working-directory: math/bernstein_obstacle/lean
        run: |
          set -euo pipefail
          files=(
            BernsteinObstacle/PhysicalOddMeshQuadratic.lean
            BernsteinObstacle/PhysicalCoefficientDistance.lean
            BernsteinObstacle/PhysicalQuadraticH1.lean
            BernsteinObstacle/PhysicalNormTransport.lean
            BernsteinObstacle/PhysicalNormTransportAutomatic.lean
            BernsteinObstacle/GreenRecoverySequence.lean
            BernsteinObstacle/GreenTraceDefect.lean
            BernsteinObstacle/GreenInterpolationRate.lean
            BernsteinObstacle/GreenOddMeshClosedLimit.lean
            BernsteinObstacle/GreenOddMeshFiniteSums.lean
            BernsteinObstacle/GreenOddMeshDiscreteEnergy.lean
            BernsteinObstacle/OneStepFittedAFEM.lean
            BernsteinObstacle/OneStepFittedAFEMBestError.lean
            BernsteinObstacle/GeneralContactFittedAFEM.lean
          )
          if grep -InE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|^[[:space:]]*opaque[[:space:]]' "${files[@]}"; then exit 1; fi
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Download pinned mathlib cache
        shell: bash
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get
      - name: Compile terminal all-three closure
        shell: bash
        working-directory: math/bernstein_obstacle/lean
        run: |
          set -euo pipefail
          lake build BernsteinObstacle.PhysicalOddMeshQuadratic 2>&1 | tee all-three-physical-build.log
          lake build BernsteinObstacle.PhysicalCoefficientDistance 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.PhysicalQuadraticH1 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.PhysicalNormTransport 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.PhysicalNormTransportAutomatic 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenRecoverySequence 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenTraceDefect 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenInterpolationRate 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenOddMeshClosedLimit 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenOddMeshFiniteSums 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GreenOddMeshDiscreteEnergy 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.OneStepFittedAFEM 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.OneStepFittedAFEMBestError 2>&1 | tee -a all-three-physical-build.log
          lake build BernsteinObstacle.GeneralContactFittedAFEM 2>&1 | tee -a all-three-physical-build.log
      - name: Audit theorem axioms
        shell: bash
        working-directory: math/bernstein_obstacle/lean
        run: |
          set -euo pipefail
          lake env lean AllThreePhysicalAudit.lean 2>&1 | tee all-three-physical-axioms.log
          if grep -q 'sorryAx' all-three-physical-axioms.log; then exit 1; fi
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-all-three-windows-audit
          path: |
            math/bernstein_obstacle/lean/all-three-physical-build.log
            math/bernstein_obstacle/lean/all-three-physical-axioms.log
          if-no-files-found: warn
