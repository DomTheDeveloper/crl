name: VC2 direct macOS Lean audit

on:
  pull_request:
    paths:
      - '.github/workflows/tmp-voronovskaja-one-shot.yml'

permissions:
  contents: read

concurrency:
  group: vc2-direct-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone exact VC2 proof branch
        shell: bash
        run: |
          set -euxo pipefail
          git clone --branch agent/solve-vc2-convex-counterexample --single-branch \
            https://github.com/DomTheDeveloper/formal-conjectures.git \
            "$RUNNER_TEMP/formal-conjectures"
          cd "$RUNNER_TEMP/formal-conjectures"
          test "$(git rev-parse HEAD)" = "cc22b779be4390f10206d5c289b5201b16e43def"

      - name: Restore Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        shell: bash
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Compile exact VC2 proof and audit axioms
        working-directory: ${{ runner.temp }}/formal-conjectures
        shell: bash
        run: |
          set -euxo pipefail
          proof='FormalConjectures/Other/VCDimConvexCounterexample.lean'
          if grep -nE '\b(sorry|admit|native_decide|unsafe|axiom|opaque)\b' "$proof"; then
            echo 'Forbidden proof escape found.' >&2
            exit 1
          fi
          lake env lean "$proof" 2>&1 | tee "$RUNNER_TEMP/vc2-macos.log"
          ! grep -q 'sorryAx' "$RUNNER_TEMP/vc2-macos.log"

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vc2-direct-macos-audit-log
          path: ${{ runner.temp }}/vc2-macos.log
          if-no-files-found: warn
