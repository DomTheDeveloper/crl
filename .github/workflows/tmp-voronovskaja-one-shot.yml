name: One-shot WOWII 59 exact audit

on:
  pull_request:
    paths:
      - '.github/workflows/tmp-voronovskaja-one-shot.yml'

permissions:
  contents: read

concurrency:
  group: one-shot-wowii-59-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Create isolated exact audit project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/wowii-59-audit
          cat > /tmp/wowii-59-audit/lean-toolchain <<'EOF'
          leanprover/lean4:v4.27.0
          EOF
          cat > /tmp/wowii-59-audit/lakefile.toml <<'EOF'
          name = "wowii_59_exact_audit"
          defaultTargets = ["Audit"]

          [[require]]
          name = "formal_conjectures"
          git = "https://github.com/DomTheDeveloper/formal-conjectures.git"
          rev = "658a7c412991eb7fcd019d8ea67a4d5644f98add"

          [[lean_lib]]
          name = "Audit"
          globs = ["Audit"]
          EOF
          cat > /tmp/wowii-59-audit/Audit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture59

          #check WrittenOnTheWallII.GraphConjecture59.conjecture59
          #print axioms WrittenOnTheWallII.GraphConjecture59.conjecture59
          EOF

      - name: Resolve dependencies and fetch cache
        working-directory: /tmp/wowii-59-audit
        shell: bash
        run: |
          set -euo pipefail
          lake update
          lake exe cache get

      - name: Compile exact submitted module
        working-directory: /tmp/wowii-59-audit
        shell: bash
        run: |
          set -euo pipefail
          target=.lake/packages/formal_conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean
          test -f "$target"
          test "$(git -C .lake/packages/formal_conjectures rev-parse HEAD)" = "658a7c412991eb7fcd019d8ea67a4d5644f98add"
          test "$(sha256sum "$target" | cut -d' ' -f1)" = "513940f4d24059052d836693421b8a3c8e32c06b157eb8b1147c00e76c20e5d9"
          if grep -nE '\b(sorry|admit|native_decide|axiom|opaque)\b|sorryAx' "$target"; then
            echo "Forbidden proof escape found"
            exit 1
          fi
          lake build @formal_conjectures/+FormalConjectures.WrittenOnTheWallII.GraphConjecture59 2>&1 | tee audit.log

      - name: Check theorem and audit axioms
        working-directory: /tmp/wowii-59-audit
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit.log; then
            echo "Disallowed axiom or unsafe reduction found"
            exit 1
          fi

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-59-exact-audit
          path: /tmp/wowii-59-audit/audit.log
          if-no-files-found: warn
