name: One-shot Sun 2.14(ii) exact audit

on:
  pull_request:
    paths:
      - '.github/workflows/tmp-voronovskaja-one-shot.yml'

permissions:
  contents: read

concurrency:
  group: one-shot-sun-214-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Create isolated Formal Conjectures audit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sun214-audit
          cat > /tmp/sun214-audit/lean-toolchain <<'EOF'
          leanprover/lean4:v4.27.0
          EOF
          cat > /tmp/sun214-audit/lakefile.toml <<'EOF'
          name = "sun214_exact_audit"
          defaultTargets = ["Audit"]

          [[require]]
          name = "formal_conjectures"
          git = "https://github.com/DomTheDeveloper/formal-conjectures.git"
          rev = "agent/sun-214-ii-dev"

          [[lean_lib]]
          name = "Audit"
          globs = ["Audit"]
          EOF
          cat > /tmp/sun214-audit/Audit.lean <<'EOF'
          import FormalConjectures.Arxiv.«1402.6641».Conjecture2_14_ii

          #check SunConjecture214II.conjecture_2_14_ii
          #print axioms SunConjecture214II.conjecture_2_14_ii
          EOF

      - name: Resolve and fetch cache
        working-directory: /tmp/sun214-audit
        shell: bash
        run: |
          set -euo pipefail
          lake update
          lake exe cache get

      - name: Build theorem and audit axioms
        working-directory: /tmp/sun214-audit
        shell: bash
        run: |
          set -euo pipefail
          lake build '@formal_conjectures/+FormalConjectures.Arxiv.1402.6641.Conjecture2_14_ii' 2>&1 | tee audit.log
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit.log; then
            exit 1
          fi

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sun214-one-shot-audit
          path: /tmp/sun214-audit/audit.log
          if-no-files-found: warn
