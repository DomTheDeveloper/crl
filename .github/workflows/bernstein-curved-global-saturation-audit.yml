name: Bernstein curved global saturation Lean audit

on:
  push:
    branches:
      - formal/bernstein-curved-global-saturation-v1
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-curved-global-saturation-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-curved-global-saturation-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-curved-global-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get
      - name: Build explicit curved global endpoint
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build BernsteinObstacle.CurvedGlobalSaturation 2>&1 | tee curved-global-build.log
          lake build BernsteinObstacle 2>&1 | tee -a curved-global-build.log
      - name: Audit explicit curved global endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          cat > CurvedGlobalAudit.lean <<'EOF'
          import BernsteinObstacle.CurvedGlobalSaturation
          #print axioms BernsteinObstacle.curvedPatch_threeHalves_explicit
          #print axioms BernsteinObstacle.curvedPatch_threeHalves_with_remainder_explicit
          EOF
          lake env lean CurvedGlobalAudit.lean 2>&1 | tee curved-global-axioms.log
          if grep -q 'sorryAx' curved-global-axioms.log; then exit 1; fi
          grep -F 'BernsteinObstacle.curvedPatch_threeHalves_explicit' curved-global-axioms.log
          grep -F 'BernsteinObstacle.curvedPatch_threeHalves_with_remainder_explicit' curved-global-axioms.log
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-curved-global-saturation-audit
          path: |
            math/bernstein_obstacle/lean/curved-global-build.log
            math/bernstein_obstacle/lean/curved-global-axioms.log
          if-no-files-found: warn
