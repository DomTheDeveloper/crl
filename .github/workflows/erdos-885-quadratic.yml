name: Erdős 885 reduced quadratic Prym descents

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_quad_small.py'
      - '.github/workflows/erdos-885-quadratic.yml'
  workflow_dispatch:

jobs:
  descent:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        orbit: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Run direct Simon two-descent
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/work" -w /work sagemath/sagemath:latest \
            sage -python research/erdos885/sage_quad_small.py ${{ matrix.orbit }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quad-small-${{ matrix.orbit }}
          path: results/quad_small_${{ matrix.orbit }}.json
          if-no-files-found: warn
