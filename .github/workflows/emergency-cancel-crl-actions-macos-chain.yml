name: Emergency trusted macOS CRL canceler

on:
  workflow_run:
    workflows:
      - Emergency PR flush checkerboard queue
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Cancel every other active CRL workflow run
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const currentRun = Number(process.env.GITHUB_RUN_ID);
            let page = 1;
            let cancelled = 0;
            let failed = 0;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, per_page: 100, page
              });
              for (const run of data.workflow_runs) {
                if (run.status === 'completed' || run.id === currentRun) continue;
                core.info(`Cancelling ${run.id}: ${run.name} (${run.status})`);
                try {
                  await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                  cancelled += 1;
                } catch (firstError) {
                  try {
                    await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/force-cancel', {
                      owner, repo, run_id: run.id
                    });
                    cancelled += 1;
                  } catch (secondError) {
                    failed += 1;
                    core.warning(`Failed to cancel ${run.id}: ${secondError.message}`);
                  }
                }
              }
              if (data.workflow_runs.length < 100) break;
              page += 1;
            }
            core.info(`Accepted ${cancelled} cancellation requests; ${failed} failed.`);
