name: Isolated Voronovskaja macOS audit

on:
  pull_request:
    paths:
      - 'ci/lean/Voronovskaja/**'
      - '.github/workflows/voronovskaja-isolated-macos.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-voronovskaja-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/Voronovskaja
        run: lake update
      - name: Apply final product-normalization patch
        working-directory: ci/lean/Voronovskaja/.lake/packages/formal_conjectures
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean")
          text = path.read_text()
          old = """  rw [hexp]
  push_cast
  ring
"""
          new = """  rw [hexp]
  push_cast
  rw [mul_pow]
  ac_rfl
"""
          if text.count(old) != 1:
              raise SystemExit("expected exactly one Voronovskaja normalization site")
          path.write_text(text.replace(old, new))
          PY
      - name: Fetch Mathlib cache
        working-directory: ci/lean/Voronovskaja
        run: lake exe cache get
      - name: Build exact proof dependency graph
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -euo pipefail
          lake build '@formal_conjectures/+FormalConjectures.Paper.VoronovskajaTypeFormula' \
            2>&1 | tee audit.log
      - name: Compile and audit exact catalog theorem
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit.log; then
            exit 1
          fi
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-isolated-macos
          path: ci/lean/Voronovskaja/audit.log
          if-no-files-found: warn
