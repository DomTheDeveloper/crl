name: Isolated Voronovskaja macOS audit

on:
  pull_request:
    paths:
      - 'ci/lean/Voronovskaja/**'
      - '.github/workflows/voronovskaja-isolated-macos.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-voronovskaja-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/Voronovskaja
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: ci/lean/Voronovskaja
        run: lake exe cache get
      - name: Probe current Lean and Mathlib APIs
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -euo pipefail
          cat > Probe.lean <<'EOF'
          import FormalConjectures.Paper.VoronovskajaProof
          import FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialTails
          import Mathlib.Probability.ProbabilityMassFunction.Constructions
          import Mathlib.Probability.ProbabilityMassFunction.Integrals
          import Mathlib.MeasureTheory.Integral.DominatedConvergence

          #check Fin.sum_univ_eq_sum_range
          #check Finset.sum_attach
          #check ENNReal.ofReal_sum_of_nonneg
          #check ProbabilityTheory.binomialPMF_apply_toReal
          #check ProbabilityTheory.standardizedBinomialMeasure
          #check ProbabilityTheory.binomialRealMeasure
          #check PMF.toMeasure_map
          #check PMF.map_map
          #check Measure.map_map
          #check Measure.eq_of_cdf
          #check Measure.ext_of_Iic
          #check tendsto_integral_filter_of_dominated_convergence
          #check Real.rpow_le_self_of_le_one
          #print ProbabilityTheory.standardizedBinomialMeasure
          #print ProbabilityTheory.binomialRealMeasure
          EOF
          lake env lean Probe.lean 2>&1 | tee probe.log
      - name: Build exact proof dependency graph
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set +e
          lake build '@formal_conjectures/+FormalConjectures.Paper.VoronovskajaTypeFormula' \
            > audit.log 2>&1
          status=$?
          cat audit.log
          printf '%s\n' "$status" > audit.status
          exit 0
      - name: Compile and audit exact catalog theorem
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -euo pipefail
          status=$(cat audit.status)
          if [[ "$status" != 0 ]]; then exit "$status"; fi
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit.log; then
            exit 1
          fi
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-isolated-macos
          path: |
            ci/lean/Voronovskaja/probe.log
            ci/lean/Voronovskaja/audit.log
            ci/lean/Voronovskaja/audit.status
          if-no-files-found: warn
