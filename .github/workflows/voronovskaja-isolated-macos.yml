name: Isolated Voronovskaja final kernel audit

on:
  pull_request:
    paths:
      - 'ci/lean/Voronovskaja/**'
      - '.github/workflows/voronovskaja-isolated-macos.yml'
  push:
    branches:
      - audit/voronovskaja-crl-isolated
    paths:
      - 'ci/lean/Voronovskaja/**'
      - '.github/workflows/voronovskaja-isolated-macos.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-voronovskaja-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/Voronovskaja
        run: lake update
      - name: Materialize canonical Lean 4.27 migrations
        working-directory: ci/lean/Voronovskaja/.lake/packages/formal_conjectures
        shell: bash
        run: |
          set -o pipefail
          {
            python3 .github/voronovskaja_migrate.py
            python3 .github/voronovskaja_migrate_round2.py
            python3 .github/voronovskaja_migrate_round5.py
            sed -i 's/open scoped ENNREAL/open scoped ENNReal/' \
              FormalConjectures/Paper/VoronovskajaClassicalConcentration.lean
          } 2>&1 | tee ../../../migration.log
      - name: Fetch Mathlib cache
        working-directory: ci/lean/Voronovskaja
        run: lake exe cache get
      - name: Reject unfinished proof markers
        working-directory: ci/lean/Voronovskaja/.lake/packages/formal_conjectures
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -nE '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)|^[[:space:]]*axiom[[:space:]]' \
              FormalConjectures/Paper/Voronovskaja*.lean \
              FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean \
              FormalConjecturesForMathlib/Probability/CDFConvergence.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean \
              FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial*.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomial*.lean; then
            exit 1
          fi
      - name: Build exact theorem and dependencies
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -o pipefail
          lake build '@formal_conjectures/+FormalConjectures.Paper.VoronovskajaTypeFormula' \
            2>&1 | tee audit.log
      - name: Compile and audit catalog theorem
        working-directory: ci/lean/Voronovskaja
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit.log; then
            exit 1
          fi
      - name: Upload transcript and migrated source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-final-kernel-audit
          path: |
            ci/lean/Voronovskaja/migration.log
            ci/lean/Voronovskaja/audit.log
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjectures/Paper/VoronovskajaClassicalConcentration.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjectures/Paper/VoronovskajaDiscreteLaw.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjectures/Paper/VoronovskajaProof.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjectures/Paper/VoronovskajaExpectation.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjectures/Paper/VoronovskajaMomentLimit.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialSecondMoment.lean
            ci/lean/Voronovskaja/.lake/packages/formal_conjectures/FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTailIntegrability.lean
          if-no-files-found: warn
