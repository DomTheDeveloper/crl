name: One-shot cancel all active workflow runs

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  cancel-all:
    if: github.event.issue.title == 'ADMIN-CANCEL-ALL-CRL-RUNS-20260719-7F3A9C'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel every other active workflow run
        id: cancel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          declare -A seen=()
          cancelled=0
          failed=0

          # Repeat to catch runs that enter the queue while cancellation is underway.
          for pass in 1 2 3 4; do
            mapfile -t ids < <(
              gh api --paginate "repos/${REPO}/actions/runs?per_page=100" \
                --jq '.workflow_runs[] | select(.status != "completed") | .id' \
                | sort -u
            )

            new_ids=0
            for id in "${ids[@]}"; do
              [[ "${id}" == "${CURRENT_RUN_ID}" ]] && continue
              [[ -n "${seen[$id]:-}" ]] && continue
              seen[$id]=1
              new_ids=$((new_ids + 1))

              if gh api --method POST "repos/${REPO}/actions/runs/${id}/cancel" >/dev/null 2>&1; then
                cancelled=$((cancelled + 1))
                echo "Cancellation requested for run ${id}"
              else
                failed=$((failed + 1))
                echo "Could not cancel run ${id}; it may already have finished."
              fi
            done

            [[ "${new_ids}" -eq 0 ]] && break
            sleep 5
          done

          echo "cancelled=${cancelled}" >> "${GITHUB_OUTPUT}"
          echo "failed=${failed}" >> "${GITHUB_OUTPUT}"

      - name: Remove this one-shot workflow
        id: cleanup
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_PATH: .github/workflows/__cancel_all_runs_one_shot.yml
        run: |
          set -euo pipefail
          default_branch="$(gh api "repos/${REPO}" --jq '.default_branch')"
          file_sha="$(gh api "repos/${REPO}/contents/${WORKFLOW_PATH}?ref=${default_branch}" --jq '.sha')"
          gh api --method DELETE "repos/${REPO}/contents/${WORKFLOW_PATH}" \
            -f message='chore: remove one-shot workflow canceller [skip actions]' \
            -f sha="${file_sha}" \
            -f branch="${default_branch}" >/dev/null

      - name: Report and close trigger issue
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CANCELLED: ${{ steps.cancel.outputs.cancelled }}
          FAILED: ${{ steps.cancel.outputs.failed }}
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
        run: |
          set -euo pipefail
          body="Cancellation requested for ${CANCELLED:-0} active workflow run(s). ${FAILED:-0} cancellation request(s) could not be submitted because those runs likely completed concurrently. One-shot workflow cleanup: ${CLEANUP_OUTCOME}."
          gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body "${body}"
          gh issue close "${ISSUE_NUMBER}" --repo "${REPO}" --reason completed
