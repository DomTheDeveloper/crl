name: Verify Conway 99 campaign
on:
  push:
    paths:
      - 'math/conway99/**'
      - '.github/workflows/verify-conway99.yml'
  pull_request:
    paths:
      - 'math/conway99/**'
      - '.github/workflows/verify-conway99.yml'
jobs:
  exact-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r math/conway99/requirements.txt
      - run: pytest -q math/conway99/tests
      - run: python math/conway99/src/symmetry_audit.py
      - run: python math/conway99/src/make_regressions.py --out /tmp/conway99-regressions
