name: Prior-art check (A317940)

# Network-heavy literature crawl. Run manually when preparing a release.

on:
  workflow_dispatch:

concurrency:
  group: prior-art-a317940
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prior-art:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run prior-art crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/prior-art/check.mjs
      - name: Summarize
        if: always()
        run: |
          echo "## Prior-art report (A317940)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat math/a317940/prior-art-report.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no report)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prior-art-report
          path: math/a317940/prior-art-report.json
          retention-days: 7
