name: WOWII 217 final Lean audit

on:
  push:
    branches:
      - audit/c217-slim-checker
  workflow_dispatch:

concurrency:
  group: wowii217-final-audit
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-slim
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone current C217 source
        run: |
          set -euxo pipefail
          git clone --branch agent/c217-closure-backport --single-branch https://github.com/DomTheDeveloper/formal-conjectures.git "$RUNNER_TEMP/formal-conjectures"
          cd "$RUNNER_TEMP/formal-conjectures"
          git rev-parse HEAD | tee "$RUNNER_TEMP/source-sha.txt"

      - name: Restore Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Build C217 stack
        id: lean
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          lake build \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217PartialDispatcher \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217RegularCertificate \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217RegularRows \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217ExceptionalDispatcher \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217TerminalReduction \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.GraphConjecture217Reduction \
            2>&1 | tee "$RUNNER_TEMP/c217-lean.log"

      - name: Replay deterministic certificates
        id: certificate
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          python3 scripts/c217_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-certificate.log"
          git diff --exit-code -- scripts/c217_certificate.json
          python3 scripts/c217_order_bound_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-order-certificate.log"
          git diff --exit-code -- scripts/c217_order_bound_certificate.json

      - name: Write status
        if: always()
        run: |
          {
            echo "source=$(cat "$RUNNER_TEMP/source-sha.txt" 2>/dev/null || echo unavailable)"
            echo "lean=${{ steps.lean.outcome }}"
            echo "certificates=${{ steps.certificate.outcome }}"
            echo "run=${{ github.run_id }}"
          } > "$RUNNER_TEMP/status.txt"

      - name: Publish diagnostics branch
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/results"
          cp "$RUNNER_TEMP/status.txt" "$RUNNER_TEMP/results/"
          cp "$RUNNER_TEMP/source-sha.txt" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cp "$RUNNER_TEMP/c217-lean.log" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cp "$RUNNER_TEMP/c217-certificate.log" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cp "$RUNNER_TEMP/c217-order-certificate.log" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cd "$RUNNER_TEMP/results"
          git init
          git checkout -b audit/wowii217-results
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "Publish WOWII 217 audit diagnostics"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin HEAD:audit/wowii217-results

      - name: Enforce audit
        run: |
          test '${{ steps.lean.outcome }}' = success
          test '${{ steps.certificate.outcome }}' = success
          ! grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool|native_decide' "$RUNNER_TEMP/c217-lean.log"
