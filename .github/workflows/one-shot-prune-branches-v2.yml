name: One-shot branch cleanup v2

on:
  pull_request:
    paths:
      - .github/workflows/one-shot-prune-branches-v2.yml
  workflow_dispatch:

concurrency:
  group: one-shot-branch-cleanup-v2
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Preserve gh-pages, switch default, and delete all other branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          api_get() {
            curl --fail-with-body --silent --show-error "${headers[@]}" "$1"
          }

          api_delete() {
            curl --fail-with-body --silent --show-error -X DELETE "${headers[@]}" "$1"
          }

          api_post() {
            curl --fail-with-body --silent --show-error -X POST "${headers[@]}" \
              -H "Content-Type: application/json" --data "$2" "$1"
          }

          api_patch() {
            curl --fail-with-body --silent --show-error -X PATCH "${headers[@]}" \
              -H "Content-Type: application/json" --data "$2" "$1"
          }

          create_pages_if_missing() {
            if ! api_get "$api/git/ref/heads/gh-pages" >/dev/null 2>&1; then
              api_post "$api/git/refs" \
                "$(jq -cn --arg ref 'refs/heads/gh-pages' --arg sha "$pages_sha" '{ref:$ref,sha:$sha}')" \
                >/dev/null
            fi
          }

          default_branch="$(api_get "$api" | jq -r '.default_branch')"
          pages_sha="$(api_get "$api/git/ref/heads/gh-pages" | jq -r '.object.sha')"
          renamed_default="branch-cleanup-old-default"

          rollback() {
            status=$?
            if [[ $status -ne 0 ]]; then
              echo "Cleanup failed; restoring gh-pages if needed."
              create_pages_if_missing || true
            fi
            exit $status
          }
          trap rollback EXIT

          echo "Current default branch: $default_branch"
          echo "Preserved gh-pages commit: $pages_sha"

          if [[ "$default_branch" != "gh-pages" ]]; then
            echo "Renaming current default branch to temporary branch."
            api_post "$api/branches/$default_branch/rename" \
              "$(jq -cn --arg new_name "$renamed_default" '{new_name:$new_name}')" \
              >/dev/null

            actual_default="$(api_get "$api" | jq -r '.default_branch')"
            [[ "$actual_default" == "$renamed_default" ]]

            echo "Deleting old gh-pages ref before second rename."
            api_delete "$api/git/refs/heads/gh-pages"

            echo "Renaming temporary default branch to gh-pages."
            api_post "$api/branches/$renamed_default/rename" '{"new_name":"gh-pages"}' >/dev/null

            echo "Restoring preserved gh-pages commit."
            api_patch "$api/git/refs/heads/gh-pages" \
              "$(jq -cn --arg sha "$pages_sha" '{sha:$sha,force:true}')" \
              >/dev/null
          fi

          echo "Deleting all remaining non-gh-pages refs."
          api_get "$api/git/matching-refs/heads/" \
            | jq -r '.[].ref | sub("^refs/heads/"; "")' \
            | while IFS= read -r branch; do
                [[ "$branch" == "gh-pages" ]] && continue
                echo "Deleting $branch"
                api_delete "$api/git/refs/heads/$branch"
              done

          final_default="$(api_get "$api" | jq -r '.default_branch')"
          mapfile -t final_branches < <(
            api_get "$api/git/matching-refs/heads/" \
              | jq -r '.[].ref | sub("^refs/heads/"; "")' \
              | sort
          )

          printf 'Final default branch: %s\n' "$final_default"
          printf 'Final branches:\n%s\n' "${final_branches[*]}"

          [[ "$final_default" == "gh-pages" ]]
          [[ "${#final_branches[@]}" -eq 1 ]]
          [[ "${final_branches[0]}" == "gh-pages" ]]

          trap - EXIT
