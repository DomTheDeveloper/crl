# Disposable external compiler harness for Formal Conjectures PR #16.
name: Temporary Erdős 7 verifier

on:
  push:
    branches:
      - tmp-erdos7-verify-20260716
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: erdos7-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Check out exact proof branch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: erdos7-obstruction-lean
          path: formal-conjectures

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch mathlib cache
        working-directory: formal-conjectures
        run: lake exe cache get

      - name: Guard source
        working-directory: formal-conjectures
        run: "! grep -nE '(^|[[:space:]])(sorry|admit)([[:space:]]|$)' FormalConjectures/ErdosProblems/Erdos7Obstructions.lean"

      - name: Compile obstruction kernel
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -o pipefail
          lake env lean FormalConjectures/ErdosProblems/Erdos7Obstructions.lean 2>&1 | tee /tmp/erdos7-lean.log

      - name: Axiom audit
        working-directory: formal-conjectures
        shell: bash
        run: |
          cat > Erdos7AxiomAudit.lean <<'EOF'
          import FormalConjectures.ErdosProblems.Erdos7Obstructions
          #print axioms Erdos7Obstructions.block_excess_two
          #print axioms Erdos7Obstructions.block_excess_one
          #print axioms Erdos7Obstructions.profile_threshold
          #print axioms Erdos7Obstructions.u315_capacity_arithmetic
          #print axioms Erdos7Obstructions.u675_box_arithmetic
          #print axioms Erdos7Obstructions.lcm_45045_gap
          #print axioms Erdos7Obstructions.lcm_4729725_profile_gap
          #print axioms Erdos7Obstructions.lcm_6081075_profile_gap
          #print axioms Erdos7Obstructions.two_fiber_correction_363825
          #print axioms Erdos7Obstructions.two_fiber_correction_467775
          EOF
          set -o pipefail
          lake env lean Erdos7AxiomAudit.lean 2>&1 | tee /tmp/erdos7-axioms.log
          ! grep -E 'sorryAx' /tmp/erdos7-axioms.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erdos7-macos-lean-logs
          path: |
            /tmp/erdos7-lean.log
            /tmp/erdos7-axioms.log
