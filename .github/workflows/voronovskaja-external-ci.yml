name: Voronovskaja external verifier

on:
  push:
    branches:
      - ci/voronovskaja-external-runner
    paths:
      - '.github/workflows/voronovskaja-external-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out temporary runner branch
        uses: actions/checkout@v4
        with:
          ref: ci/voronovskaja-external-runner

      - name: Check out canonical proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: b38c2fe292a2fd4e1166d24141a23d1f5ccc6964
          path: formal-conjectures

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Compile and capture diagnostics
        shell: bash
        run: |
          mkdir -p ci-results
          cd formal-conjectures
          set +e
          {
            echo '=== CANONICAL COMMIT ==='
            git rev-parse HEAD
            echo '=== TOOLCHAIN ==='
            cat lean-toolchain
            lean --version
            lake --version
            echo '=== CACHE ==='
            lake exe cache get
            echo '=== BUILD ==='
            lake build \
              FormalConjecturesForMathlib.MeasureTheory.Measure.CharacteristicFunction.TaylorExpansion \
              FormalConjecturesForMathlib.Order.Filter.ENNReal \
              FormalConjecturesForMathlib.MeasureTheory.Measure.LevyConvergence \
              FormalConjecturesForMathlib.Probability.CentralLimitTheorem \
              FormalConjecturesForMathlib.Probability.Distributions.Bernoulli \
              FormalConjecturesForMathlib.Probability.Distributions.Binomial \
              FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomial \
              FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialTails \
              FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialMGF \
              FormalConjecturesForMathlib.Probability.CDFConvergence \
              FormalConjecturesForMathlib.Probability.Distributions.PoweredGaussian \
              FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialLimit \
              FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialTails \
              FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialMoments \
              FormalConjectures.Paper.VoronovskajaProof \
              FormalConjectures.Paper.VoronovskajaDiscreteLaw
            status=$?
            echo "=== EXIT STATUS: $status ==="
          } > ../ci-results/voronovskaja.log 2>&1
          echo "$status" > ../ci-results/voronovskaja.status
          exit 0

      - name: Commit diagnostics to temporary branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ci-results/voronovskaja.log ci-results/voronovskaja.status
          git commit -m 'ci: record Voronovskaja compiler diagnostics' || exit 0
          git push origin HEAD:ci/voronovskaja-external-runner
