name: Litt most-unfair direct audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: litt-most-unfair-direct-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout immutable proof commit
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: f036e066184e623b8eeb3985be2682537272ce04
          path: formal-conjectures

      - name: Set up pinned Lean environment
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal-conjectures
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Confirm immutable proof commit
        working-directory: formal-conjectures
        run: test "$(git rev-parse HEAD)" = "f036e066184e623b8eeb3985be2682537272ce04"

      - name: Reject proof escapes
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          files=$(printf '%s\n' FormalConjectures/Other/LittMostUnfairBet*.lean)
          if grep -nE '(^|[^[:alnum:]_])(sorry|admit|native_decide)([^[:alnum:]_]|$)' $files; then
            echo 'Proof hole or unsupported decision shortcut found.'
            exit 1
          fi
          if grep -nE '^[[:space:]]*(axiom|unsafe|opaque)([[:space:]]|$)' $files; then
            echo 'Custom axiom or unsafe/opaque declaration found.'
            exit 1
          fi

      - name: Compile complete proof chain
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/Other/LittMostUnfairBetDefs.lean
            FormalConjectures/Other/LittMostUnfairBetProof.lean
            FormalConjectures/Other/LittMostUnfairBetWalsh.lean
            FormalConjectures/Other/LittMostUnfairBetWalshCorrelation.lean
            FormalConjectures/Other/LittMostUnfairBetWalshShapes.lean
            FormalConjectures/Other/LittMostUnfairBetWalshGap.lean
            FormalConjectures/Other/LittMostUnfairBetWalshInteriorGap.lean
            FormalConjectures/Other/LittMostUnfairBetWalshShiftCorrelation.lean
            FormalConjectures/Other/LittMostUnfairBetWalshNormalize.lean
            FormalConjectures/Other/LittMostUnfairBetWalshOrbit.lean
            FormalConjectures/Other/LittMostUnfairBetWalshPairSum.lean
            FormalConjectures/Other/LittMostUnfairBetWalshUpperOrbit.lean
            FormalConjectures/Other/LittMostUnfairBetWalshSumFlatten.lean
            FormalConjectures/Other/LittMostUnfairBetWalshEnergyTranslate.lean
            FormalConjectures/Other/LittMostUnfairBetWalshEnergyDiagonal.lean
            FormalConjectures/Other/LittMostUnfairBetWalshEnergyUpper.lean
            FormalConjectures/Other/LittMostUnfairBetWalshEnergyIdentity.lean
            FormalConjectures/Other/LittMostUnfairBetWalshVariance.lean
            FormalConjectures/Other/LittMostUnfairBetWalshOverlapBridge.lean
            FormalConjectures/Other/LittMostUnfairBetWalshConstantGap.lean
            FormalConjectures/Other/LittMostUnfairBetWalshOneEndpointGap.lean
            FormalConjectures/Other/LittMostUnfairBetReversal.lean
            FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointCore.lean
            FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointToggle.lean
            FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean
            FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointComplete.lean
            FormalConjectures/Other/LittMostUnfairBetWalshAssembly.lean
            FormalConjectures/Other/LittMostUnfairBet.lean
          )
          : > /tmp/litt-lean.log
          for file in "${files[@]}"; do
            echo "=== $file ===" | tee -a /tmp/litt-lean.log
            lake env lean -DwarningAsError=true "$file" 2>&1 | tee -a /tmp/litt-lean.log
          done
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' /tmp/litt-lean.log; then
            echo 'Unsupported axiom or compiler-trust shortcut found.'
            exit 1
          fi

      - name: Run exact finite audit
        working-directory: formal-conjectures
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10

      - name: Upload transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: litt-most-unfair-audit-logs
          path: /tmp/litt-lean.log
          if-no-files-found: warn
