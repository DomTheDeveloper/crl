name: Erdős 885 extended mod-four sieve

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_kummer_mod4_continue.py'
      - 'research/erdos885/sage_kummer_mod4.py'
      - '.github/workflows/erdos-885-kummer-mod4-continue.yml'
  workflow_dispatch:

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Pull SageMath container
        run: docker pull sagemath/sagemath:latest
      - name: Test all usable good primes below 5000
        run: |
          mkdir -p results
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage -python research/erdos885/sage_kummer_mod4_continue.py
      - name: Show result
        if: always()
        run: cat results/kummer_mod4_continue.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-kummer-mod4-continue
          path: results/kummer_mod4_continue.json
          if-no-files-found: warn
