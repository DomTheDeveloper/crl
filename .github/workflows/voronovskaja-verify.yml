name: Voronovskaja Lean verifier

on:
  push:
    branches:
      - ci/voronovskaja-verify
  pull_request:
    paths:
      - '.github/workflows/voronovskaja-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crl-voronovskaja-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out proof branch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: solve-voronovskaja-no-sorry
          path: formal-conjectures

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean dependency cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mathlib
            formal-conjectures/.lake/packages
          key: crl-voronovskaja-${{ hashFiles('formal-conjectures/lake-manifest.json') }}
          restore-keys: |
            crl-voronovskaja-

      - name: Fetch precompiled dependencies
        working-directory: formal-conjectures
        run: lake exe cache get >/dev/null

      - name: Verify proof modules
        id: lean
        working-directory: formal-conjectures
        shell: bash
        run: |
          set +e
          log=/tmp/lean.log
          : > "$log"
          status=0

          compile_module() {
            source="$1"
            module="${source%.lean}"
            out=".lake/build/lib/lean/${module}.olean"
            ilean=".lake/build/lib/lean/${module}.ilean"
            mkdir -p "$(dirname "$out")"
            echo "=== Compiling ${source} ===" >> "$log"
            lake env lean "$source" -o "$out" -i "$ilean" >> "$log" 2>&1
          }

          compile_module FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean || status=$?
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Order/Filter/ENNReal.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialTails.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialMGF.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/CDFConvergence.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialLimit.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTails.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean || status=$?; fi
          if [ "$status" -eq 0 ]; then
            lake build FormalConjectures.Paper.VoronovskajaAffine \
              FormalConjectures.Paper.VoronovskajaEndpoints >> "$log" 2>&1 || status=$?
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 800 "$log"
          exit 0

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log

      - name: Fail when Lean fails
        if: steps.lean.outputs.status != '0'
        run: exit 1
