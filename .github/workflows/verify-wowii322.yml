name: Verify WOWII 322 Lean proof

on:
  pull_request:
    paths:
      - math/wowii/322/**
      - .github/workflows/verify-wowii322.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-wowii322-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out pinned Formal Conjectures proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 271895775d9833dd8a1480126cbe112779d953ef
          path: formal-conjectures

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download Mathlib cache
        shell: bash
        working-directory: formal-conjectures
        run: lake exe cache get

      - name: Compile exact theorem module
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture322 2>&1 \
            | tee ../wowii322-build.log

      - name: Audit exact theorem axioms
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          cat > AuditWOWII322.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture322
          #check WrittenOnTheWallII.GraphConjecture322.conjecture322
          #print axioms WrittenOnTheWallII.GraphConjecture322.conjecture322
          EOF
          lake env lean AuditWOWII322.lean 2>&1 | tee ../wowii322-axioms.log
          if grep -q sorryAx ../wowii322-axioms.log; then
            echo 'conjecture322 depends on sorryAx' >&2
            exit 1
          fi
          grep -F 'WrittenOnTheWallII.GraphConjecture322.conjecture322' ../wowii322-axioms.log

      - name: Reject proof holes and unsafe shortcuts
        shell: bash
        run: |
          set -euo pipefail
          file=formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture322.lean
          if grep -InE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|^[[:space:]]*opaque[[:space:]]' "$file"; then
            exit 1
          fi

      - name: Upload verification transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii322-independent-audit
          path: |
            wowii322-build.log
            wowii322-axioms.log
          if-no-files-found: warn
