name: Bernstein phase-weighted saturation Lean audit

on:
  push:
    branches:
      - formal/bernstein-mesh-instantiation-program-v1
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-phase-weighted-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-phase-weighted-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-phase-weighted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build full library and weighted endpoint
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build BernsteinObstacle 2>&1 | tee phase-weighted-build.log
          lake build BernsteinObstacle.PhaseWeightedSaturation 2>&1 | tee -a phase-weighted-build.log

      - name: Audit weighted endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean PhaseWeightedSaturationAudit.lean 2>&1 | tee phase-weighted-axioms.log
          if grep -q 'sorryAx' phase-weighted-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.weighted_sum_local_lowerBound' phase-weighted-axioms.log
          grep -F 'BernsteinObstacle.phaseWeighted_sum_energy_ge_cubic' phase-weighted-axioms.log
          grep -F 'BernsteinObstacle.phaseWeighted_error_ge_threeHalves_of_sum_le_sq' phase-weighted-axioms.log

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-phase-weighted-saturation-audit
          path: |
            math/bernstein_obstacle/lean/phase-weighted-build.log
            math/bernstein_obstacle/lean/phase-weighted-axioms.log
          if-no-files-found: warn