name: Isolated WOWII 314 ARM64 audit

on:
  pull_request:
    paths:
      - 'ci/lean/WOWII314/**'
      - '.github/workflows/wowii314-isolated-arm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-wowii314-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/WOWII314
        run: |
          set -euo pipefail
          lake update
          cat >> .lake/packages/formal_conjectures/lakefile.toml <<'EOF'

          [[lean_lib]]
          name = "WOWII"
          EOF
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.lake/packages/formal_conjectures/WOWII/ZZGraphConjecture314C5Bags.lean')
          text = path.read_text()
          declaration = 'lemma fin5_existsUnique_neighbor_pattern\n'
          guarded = 'attribute [-instance] Classical.propDecidable in\nlemma fin5_existsUnique_neighbor_pattern\n'
          if guarded not in text:
              if declaration not in text:
                  raise SystemExit('finite lemma declaration marker not found')
              text = text.replace(declaration, guarded, 1)
          old = '''  simp only [cycleGraph_adj] at hind ⊢
  have hP : P = ![P 0, P 1, P 2, P 3, P 4] := by
    funext i
    fin_cases i <;> rfl
  rw [hP] at hne hind htwo ⊢
  cases h0 : P 0 <;> cases h1 : P 1 <;> cases h2 : P 2 <;>
    cases h3 : P 3 <;> cases h4 : P 4 <;>
    simp_all [Fin.forall_fin_succ, Fin.exists_fin_succ]
'''
          new = '''  simp only [cycleGraph_adj] at hind ⊢
  revert P
  decide
'''
          if old not in text and new not in text:
              raise SystemExit('finite lemma proof marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Fetch Mathlib cache
        working-directory: ci/lean/WOWII314
        run: lake exe cache get
      - name: Reject terminal proof holes and unsafe shortcuts
        working-directory: ci/lean/WOWII314/.lake/packages/formal_conjectures
        shell: bash
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/WrittenOnTheWallII/GraphConjecture314.lean
            WOWII/ZZGraphConjecture314Final.lean
          )
          if grep -nE '^[[:space:]]*(axiom|opaque|sorry|admit)([[:space:]]|$)|:= by[[:space:]]*(sorry|admit)([[:space:]]|$)|native_decide' "${files[@]}"; then
            exit 1
          fi
      - name: Build exact catalog theorem
        working-directory: ci/lean/WOWII314
        shell: bash
        run: |
          set -euo pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture314 2>&1 | tee build-arm.log
      - name: Audit exact catalog theorem axioms
        working-directory: ci/lean/WOWII314
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee audit-arm.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit-arm.log; then
            exit 1
          fi
          grep -F 'WrittenOnTheWallII.GraphConjecture314.conjecture314' audit-arm.log
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii314-isolated-arm
          path: |
            ci/lean/WOWII314/build-arm.log
            ci/lean/WOWII314/audit-arm.log
          if-no-files-found: warn
