name: Isolated WOWII 314 ARM64 audit
# Exact audit revision: two surviving C5 cases and corrected bag uniqueness orientation.

on:
  pull_request:
    paths:
      - 'ci/lean/WOWII314/**'
      - '.github/workflows/wowii314-isolated-arm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-wowii314-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/WOWII314
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee resolve-arm.log) 2>&1
          lake update
          cat >> .lake/packages/formal_conjectures/lakefile.toml <<'EOF'

          [[lean_lib]]
          name = "WOWII"
          EOF
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.lake/packages/formal_conjectures')

          path = root / 'WOWII/ZZGraphConjecture314C5Bags.lean'
          text = path.read_text()
          pattern = re.compile(
              r"    simp_all \[Fin\.forall_fin_succ, Fin\.exists_fin_succ\] <;>\n"
              r"    decide"
          )
          witness_order = [4, 2]
          lines = ["    simp_all [Fin.forall_fin_succ, Fin.exists_fin_succ]"]
          for k in witness_order:
              lines.extend([
                  f"  · refine ⟨({k} : Fin 5), by decide, ?_⟩",
                  "    intro y hy",
                  "    fin_cases y <;> simp_all",
              ])
          text, count = pattern.subn("\n".join(lines), text, count=1)
          print(f'C5 finite-pattern replacements: {count}')
          if count != 1:
              raise SystemExit('expected exactly one concrete Fin 5 closure')
          path.write_text(text)

          path = root / 'WOWII/ZZGraphConjecture314C5BlowupClassification.lean'
          text = path.read_text()
          pattern = re.compile(
              r"    exact \(Classical\.choose_spec\s*\n"
              r"\s*\(existsUnique_C5BagSpec G hG hTriFree hNoP5 c hc x\)\)\.2 i hi"
          )
          replacement = (
              "    exact ((Classical.choose_spec\n"
              "      (existsUnique_C5BagSpec G hG hTriFree hNoP5 c hc x)).2 i hi).symm"
          )
          text, count = pattern.subn(replacement, text, count=1)
          print(f'bag-uniqueness orientation replacements: {count}')
          if count != 1:
              raise SystemExit('expected exactly one bag uniqueness orientation site')
          path.write_text(text)
          PY
      - name: Fetch Mathlib cache
        working-directory: ci/lean/WOWII314
        run: lake exe cache get
      - name: Reject terminal proof holes and unsafe shortcuts
        working-directory: ci/lean/WOWII314/.lake/packages/formal_conjectures
        shell: bash
        run: |
          set -euo pipefail
          files=(
            FormalConjectures/WrittenOnTheWallII/GraphConjecture314.lean
            WOWII/ZZGraphConjecture314Final.lean
          )
          if grep -nE '^[[:space:]]*(axiom|opaque|sorry|admit)([[:space:]]|$)|:= by[[:space:]]*(sorry|admit)([[:space:]]|$)|native_decide' "${files[@]}"; then
            exit 1
          fi
      - name: Build exact catalog theorem
        working-directory: ci/lean/WOWII314
        shell: bash
        run: |
          set -euo pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture314 2>&1 | tee build-arm.log
      - name: Audit exact catalog theorem axioms
        working-directory: ci/lean/WOWII314
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee audit-arm.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit-arm.log; then
            exit 1
          fi
          grep -F 'WrittenOnTheWallII.GraphConjecture314.conjecture314' audit-arm.log
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii314-isolated-arm
          path: |
            ci/lean/WOWII314/resolve-arm.log
            ci/lean/WOWII314/build-arm.log
            ci/lean/WOWII314/audit-arm.log
          if-no-files-found: warn
