name: Certify checkerboard finite upper bounds

on:
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz
    paths:
      - math/checkerboard/finite_certificates/**
      - .github/workflows/certify-checkerboard-upper-bounds.yml
  workflow_dispatch:

concurrency:
  group: checkerboard-upper-certificates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  upper-bound:
    name: n=${{ matrix.n }} parity=${{ matrix.parity }} exclude=${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - n: 17
            parity: 0
            target: 27
            encoding: full
          - n: 17
            parity: 1
            target: 27
            encoding: full
          - n: 21
            parity: 0
            target: 33
            encoding: reduced
          - n: 21
            parity: 1
            target: 33
            encoding: reduced
    steps:
      - uses: actions/checkout@v4

      - name: Test deterministic arithmetic, encodings, and committed hashes
        working-directory: math/checkerboard/finite_certificates
        run: |
          set -euxo pipefail
          python3 verify_manifest.py
          python3 test_encoding.py
          python3 verify_profiles.py
          python3 generate_reduced_n21.py --parity 0 --cnf /tmp/n21-p0.cnf --metadata /tmp/n21-p0.json
          python3 generate_reduced_n21.py --parity 1 --cnf /tmp/n21-p1.cnf --metadata /tmp/n21-p1.json
          python3 verify_instance_semantics.py --cnf /tmp/n21-p0.cnf --metadata /tmp/n21-p0.json
          python3 verify_instance_semantics.py --cnf /tmp/n21-p1.cnf --metadata /tmp/n21-p1.json
          python3 verify_manifest.py --metadata /tmp/n21-p0.json /tmp/n21-p1.json

      - name: Generate and independently validate exact decision instance
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
          ENCODING: ${{ matrix.encoding }}
        run: |
          set -euxo pipefail
          root="math/checkerboard/finite_certificates"
          stem="certificates/n${N}-p${PARITY}-k${TARGET}"
          mkdir -p "$(dirname "$stem")"
          if [[ "$ENCODING" == full ]]; then
            python3 "$root/generate_cnf.py" --n "$N" --parity "$PARITY" --at-least "$TARGET" \
              --cnf "$stem.cnf" --metadata "$stem.metadata.json" | tee "$stem.generator.log"
          else
            python3 "$root/generate_reduced_n21.py" --parity "$PARITY" \
              --cnf "$stem.cnf" --metadata "$stem.metadata.json" | tee "$stem.generator.log"
          fi
          python3 "$root/verify_instance_semantics.py" --cnf "$stem.cnf" \
            --metadata "$stem.metadata.json" | tee "$stem.semantic-check.log"
          python3 "$root/verify_manifest.py" --metadata "$stem.metadata.json" \
            | tee "$stem.manifest-check.log"
          sha256sum "$stem.cnf" "$stem.metadata.json" | tee "$stem.inputs.sha256"

      - name: Cross-check with CP-SAT and HiGHS
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          python3 -m pip install --disable-pip-version-check \
            'ortools==9.15.6755' 'scipy==1.17.0'
          root="math/checkerboard/finite_certificates"
          stem="certificates/n${N}-p${PARITY}-k${TARGET}"
          timeout 20m python3 "$root/crosscheck_upper_solvers.py" --solver cpsat \
            --n "$N" --parity "$PARITY" --target "$TARGET" --seconds 900 \
            | tee "$stem.cpsat.log"
          timeout 20m python3 "$root/crosscheck_upper_solvers.py" --solver highs \
            --n "$N" --parity "$PARITY" --target "$TARGET" --seconds 900 \
            | tee "$stem.highs.log"

      - name: Build pinned solvers and proof checkers
        shell: bash
        run: |
          set -euxo pipefail
          git clone https://github.com/arminbiere/cadical.git "$RUNNER_TEMP/cadical"
          git -C "$RUNNER_TEMP/cadical" checkout 7b99c07f0bcab5824a5a3ce62c7066554017f641
          (cd "$RUNNER_TEMP/cadical" && ./configure && make -j2)

          git clone https://github.com/arminbiere/kissat.git "$RUNNER_TEMP/kissat"
          git -C "$RUNNER_TEMP/kissat" checkout 8af8e56f174b778aef3aa45af9f739b2a5f492c2
          (cd "$RUNNER_TEMP/kissat" && ./configure && make -j2)

          git clone https://github.com/marijnheule/drat-trim.git "$RUNNER_TEMP/drat-trim"
          git -C "$RUNNER_TEMP/drat-trim" checkout 2e3b2dc0ecf938addbd779d42877b6ed69d9a985
          make -C "$RUNNER_TEMP/drat-trim" -j2

          "$RUNNER_TEMP/cadical/build/cadical" --version
          "$RUNNER_TEMP/kissat/build/kissat" --version
          "$RUNNER_TEMP/drat-trim/drat-trim" -h | head -40

      - name: Prove UNSAT with CaDiCaL and cross-check with Kissat
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
        run: |
          set -u
          stem="certificates/n${N}-p${PARITY}-k${TARGET}"

          classify() {
            local code="$1" log="$2"
            if [[ "$code" == 124 ]]; then echo TIMEOUT; return; fi
            if grep -q '^s UNSATISFIABLE' "$log"; then echo UNSAT; return; fi
            if grep -q '^s SATISFIABLE' "$log"; then echo SAT; return; fi
            echo ERROR
          }

          set +e
          timeout 45m "$RUNNER_TEMP/cadical/build/cadical" "$stem.cnf" "$stem.cadical.drat" \
            > "$stem.cadical.log" 2>&1
          cadical_code=$?
          timeout 45m "$RUNNER_TEMP/kissat/build/kissat" "$stem.cnf" \
            > "$stem.kissat.log" 2>&1
          kissat_code=$?
          set -e

          cadical_status="$(classify "$cadical_code" "$stem.cadical.log")"
          kissat_status="$(classify "$kissat_code" "$stem.kissat.log")"
          printf 'solver\tstatus\texit_code\nCaDiCaL\t%s\t%s\nKissat\t%s\t%s\n' \
            "$cadical_status" "$cadical_code" "$kissat_status" "$kissat_code" | tee "$stem.solvers.tsv"

          # TIMEOUT and UNKNOWN/ERROR are intentionally no result.
          [[ "$cadical_status" == UNSAT ]]
          [[ "$kissat_status" == UNSAT ]]
          test -s "$stem.cadical.drat"

      - name: Check DRAT, emit LRAT, and check LRAT
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          stem="certificates/n${N}-p${PARITY}-k${TARGET}"
          timeout 45m "$RUNNER_TEMP/drat-trim/drat-trim" "$stem.cnf" "$stem.cadical.drat" \
            -L "$stem.lrat" | tee "$stem.drat-trim.log"
          grep -q '^s VERIFIED' "$stem.drat-trim.log"
          test -s "$stem.lrat"
          timeout 45m "$RUNNER_TEMP/drat-trim/lrat-check" "$stem.cnf" "$stem.lrat" \
            | tee "$stem.lrat-check.log"
          grep -q 'VERIFIED' "$stem.lrat-check.log"
          sha256sum "$stem.cadical.drat" "$stem.lrat" | tee "$stem.proofs.sha256"
          xz -T0 -6 "$stem.cadical.drat"
          xz -T0 -6 "$stem.lrat"
          sha256sum "$stem.cadical.drat.xz" "$stem.lrat.xz" | tee "$stem.compressed-proofs.sha256"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkerboard-upper-n${{ matrix.n }}-p${{ matrix.parity }}
          path: certificates/
          if-no-files-found: error
          retention-days: 90
