name: Exact A387471 macOS audit

on:
  push:
    branches:
      - audit/a387471-exact
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-macos-audit.yml
  pull_request:
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-macos-audit.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-a387471-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-macos:
    runs-on: macos-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Cross-check finite certificate
        working-directory: proofs/lean/A387471
        run: python3 check_finite60.py

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies and cache
        working-directory: proofs/lean/A387471
        run: |
          lake update
          lake exe cache get

      - name: Build exact proof stack
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build-macos.log

      - name: Audit exact theorem axioms
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -euo pipefail
          cat > AuditExactMac.lean <<'EOF'
          import A387471Exact
          #check A387471.exactStatement_proved
          #print axioms A387471.grid_sine_classification_proved
          #print axioms A387471.solutionTriples_eq_candidateSet
          #print axioms A387471.exactStatement_proved
          EOF
          lake env lean AuditExactMac.lean 2>&1 | tee axioms-macos.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' axioms-macos.log; then
            exit 1
          fi

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-macos-audit
          path: |
            proofs/lean/A387471/build-macos.log
            proofs/lean/A387471/axioms-macos.log
          if-no-files-found: warn
