name: External quantum color-restriction Lean audit

on:
  pull_request:
    branches:
      - audit/quantum-color-restriction-base-2026-07-22

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact Formal Conjectures audit branch
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: audit/quantum-color-restriction-base-2026-07-22

      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true

      - name: Reject proof escapes
        shell: bash
        run: |
          set -euo pipefail
          file=ProofAudit/MonochromaticQuantumGraphColorRestriction.lean
          if grep -nE '\b(sorry|admit|native_decide|unsafe|axiom|opaque)\b' "$file"; then
            echo 'Forbidden proof escape found.' >&2
            exit 1
          fi

      - name: Compile theorem and audit axioms
        shell: bash
        run: |
          set -euo pipefail
          lake env lean ProofAudit/MonochromaticQuantumGraphColorRestriction.lean \
            2>&1 | tee color-restriction.log
          if grep -q 'sorryAx' color-restriction.log; then
            echo 'Axiom audit contains sorryAx.' >&2
            exit 1
          fi

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-color-restriction-external-audit-log
          path: color-restriction.log
          if-no-files-found: error
