name: Slim C217 Lean audit

on:
  push:
    branches:
      - audit/c217-slim-checker
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: c217-focused-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    if: ${{ false }}
    runs-on: ubuntu-slim
    steps:
      - run: echo 'Paused to release the slim runner for the VC2 audit.'
