name: Slim C217 Lean audit

on:
  push:
    branches:
      - audit/c217-slim-checker
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: c217-focused-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-slim
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone current C217 branch
        run: |
          set -euxo pipefail
          git clone --branch agent/c217-closure-backport --single-branch https://github.com/DomTheDeveloper/formal-conjectures.git "$RUNNER_TEMP/formal-conjectures"
          cd "$RUNNER_TEMP/formal-conjectures"
          git rev-parse HEAD | tee "$RUNNER_TEMP/source-sha.txt"

      - name: Restore Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Build C217 proof stack
        id: lean
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          lake build \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.HamiltonianExtras \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.PathClosure \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.ChvatalPath \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217ClosureHelpers \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217FiniteCertificate \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217OrderCertificate \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217OrderBound \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217DegreeBridge \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217HamiltonDP \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217BooleanGraph \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.MaximumLeafDegree \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.DegreeTwoTraceable \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217BaseReduction \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217TerminalReduction \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.GraphConjecture217Reduction \
            2>&1 | tee "$RUNNER_TEMP/c217-slim-audit.log"

      - name: Replay deterministic certificates
        id: certificate
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          python3 scripts/c217_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-certificate.log"
          git diff --exit-code -- scripts/c217_certificate.json
          python3 scripts/c217_order_bound_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-order-certificate.log"
          git diff --exit-code -- scripts/c217_order_bound_certificate.json

      - name: Enforce audit
        run: |
          test '${{ steps.lean.outcome }}' = success
          test '${{ steps.certificate.outcome }}' = success
          ! grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' "$RUNNER_TEMP/c217-slim-audit.log"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c217-slim-audit-log
          path: |
            ${{ runner.temp }}/source-sha.txt
            ${{ runner.temp }}/c217-slim-audit.log
            ${{ runner.temp }}/c217-certificate.log
            ${{ runner.temp }}/c217-order-certificate.log
          compression-level: 0
          retention-days: 7
