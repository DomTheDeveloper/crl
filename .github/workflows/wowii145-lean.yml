name: WOWII 145 pinned Lean audit

on:
  pull_request:
    paths:
      - 'math/wowii145/**'
      - '.github/workflows/wowii145-lean.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: wowii145-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Restore pinned Lean environment
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            math/wowii145/.lake
          key: wowii145-v4.27.0-${{ hashFiles('math/wowii145/lean-toolchain', 'math/wowii145/lakefile.toml') }}
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve pinned dependencies
        working-directory: math/wowii145
        shell: bash
        run: |
          set -euo pipefail
          lake update
          if [ ! -f .lake/packages/wow_146/.lake/build/lib/lean/WOW146/ExceptionalTheorem.olean ]; then
            lake exe cache get
          fi
      - name: Build and audit
        id: lean
        working-directory: math/wowii145
        shell: bash
        run: |
          set +e
          lake build > wowii145-audit.log 2>&1
          status=$?
          lake env lean WOW145/Conjecture145.lean >> wowii145-audit.log 2>&1
          lean_status=$?
          if [ "$status" -eq 0 ]; then status=$lean_status; fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Post diagnostic tail
        if: always() && github.event_name == 'pull_request'
        working-directory: math/wowii145
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '<!-- wowii145-pinned-lean-audit -->'
            if [ '${{ steps.lean.outputs.status }}' = '0' ]; then
              echo '### Pinned Lean audit: PASS'
            else
              echo '### Pinned Lean audit: FAIL'
            fi
            echo
            echo '```text'
            tail -n 180 wowii145-audit.log
            echo '```'
          } > /tmp/wowii145-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/wowii145-comment.md
      - name: Enforce result
        if: always()
        shell: bash
        run: test '${{ steps.lean.outputs.status }}' = '0'
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii145-lean-audit
          path: math/wowii145/wowii145-audit.log
          if-no-files-found: warn
