name: WOWII 217 LRAT 8-3

on:
  push:
    branches:
      - audit/c217-slim-checker
  workflow_dispatch:

concurrency:
  group: wowii217-lrat-83
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-slim
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone C217 source and restore cache
        run: |
          set -euxo pipefail
          git clone --branch agent/c217-closure-backport --single-branch https://github.com/DomTheDeveloper/formal-conjectures.git "$RUNNER_TEMP/formal-conjectures"
          cd "$RUNNER_TEMP/formal-conjectures"
          git rev-parse HEAD | tee "$RUNNER_TEMP/source-sha.txt"
          lake exe cache get

      - name: Generate text LRAT for the cubic row
        id: generate
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          cat > "$RUNNER_TEMP/C217Regular83.lean" <<'LEAN'
          import FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217RegularCertificate
          import Std.Tactic.BVDecide
          open SimpleGraph SimpleGraph.C217RegularCertificate
          set_option maxHeartbeats 0
          set_option maxRecDepth 100000
          theorem regular_8_3_generated : RegularCertificate 8 3 := by
            bv_decide? (config := {
              timeout := 3600
              binaryProofs := false
              trimProofs := true
              solverMode := .proof })
          LEAN
          lake env lean "$RUNNER_TEMP/C217Regular83.lean" 2>&1 | tee "$RUNNER_TEMP/lrat-83.log"
          find "$RUNNER_TEMP" -type f -name '*.lrat' -print -exec cp {} "$RUNNER_TEMP/regular-8-3.lrat" \;
          test -s "$RUNNER_TEMP/regular-8-3.lrat"

      - name: Publish LRAT diagnostics
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/results"
          {
            echo "source=$(cat "$RUNNER_TEMP/source-sha.txt" 2>/dev/null || echo unavailable)"
            echo "generation=${{ steps.generate.outcome }}"
            echo "run=${{ github.run_id }}"
          } > "$RUNNER_TEMP/results/status.txt"
          cp "$RUNNER_TEMP/source-sha.txt" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cp "$RUNNER_TEMP/lrat-83.log" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cp "$RUNNER_TEMP/regular-8-3.lrat" "$RUNNER_TEMP/results/" 2>/dev/null || true
          cd "$RUNNER_TEMP/results"
          git init
          git checkout -b audit/wowii217-lrat-83-results
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "Publish WOWII 217 cubic LRAT result"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin HEAD:audit/wowii217-lrat-83-results

      - name: Enforce generation
        run: |
          test '${{ steps.generate.outcome }}' = success
