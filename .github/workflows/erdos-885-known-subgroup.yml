name: Erdős 885 isolated known image subgroup

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_known_subgroup.py'
      - '.github/workflows/erdos-885-known-subgroup.yml'
  workflow_dispatch:

concurrency:
  group: erdos-885-known-subgroup-isolated
  cancel-in-progress: true

jobs:
  subgroup:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Certify rank, saturation and Q2 Selmer-kernel inclusion
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/work" -w /work sagemath/sagemath:latest \
            sage -python research/erdos885/sage_known_subgroup.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-known-subgroup-isolated
          path: results/known_subgroup.json
          if-no-files-found: warn
