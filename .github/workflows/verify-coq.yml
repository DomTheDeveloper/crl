name: Verify Coq proofs

# Paused from automatic PR execution while the Actions queue is being recovered.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coq:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install jsCoq (Coq WASM toolchain)
        run: |
          npm init -y >/dev/null 2>&1
          npm install jscoq@0.17.1
      - name: Verify all Coq proofs
        run: node proofs/coq/verify.mjs
