name: Bernstein final three-track slim audit

# This workflow-only child branch isolates the three final modules from the
# heavyweight inherited library audits.
on:
  push:
    branches:
      - formal/bernstein-second-order-saturation-v1
    paths:
      - '.github/workflows/bernstein-urgent-slim-audit.yml'
  pull_request:
    paths:
      - '.github/workflows/bernstein-urgent-slim-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-final-three-track-slim
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get
      - name: Compile final three-track modules
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build BernsteinObstacle.GlobalSmoothSaturation 2>&1 | tee final-three-track-build.log
          lake build BernsteinObstacle.GreenProfileAsymptotic 2>&1 | tee -a final-three-track-build.log
          lake build BernsteinObstacle.SimplexQuadraticContact 2>&1 | tee -a final-three-track-build.log
          lake env lean SmoothQuadraticSaturationAudit.lean 2>&1 | tee final-three-track-axioms.log
          if grep -q 'sorryAx' final-three-track-axioms.log; then exit 1; fi
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-final-three-track-slim-audit
          path: |
            math/bernstein_obstacle/lean/final-three-track-build.log
            math/bernstein_obstacle/lean/final-three-track-axioms.log
          if-no-files-found: warn
