name: Verify checkerboard 17x17 and 21x21 constructions

on:
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz
    paths:
      - math/checkerboard/finite_certificates/**
      - .github/workflows/discover-checkerboard-17-21.yml
  workflow_dispatch:

concurrency:
  group: checkerboard-constructions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  constructions:
    name: n=${{ matrix.n }} parity=${{ matrix.parity }} target=${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - n: 17
            parity: 0
            target: 26
          - n: 17
            parity: 1
            target: 26
          - n: 21
            parity: 0
            target: 32
          - n: 21
            parity: 1
            target: 32
    steps:
      - uses: actions/checkout@v4

      - name: Test deterministic encoding and exact profiles
        working-directory: math/checkerboard/finite_certificates
        run: |
          python3 test_encoding.py
          python3 verify_profiles.py

      - name: Build pinned CaDiCaL and Kissat
        shell: bash
        run: |
          set -euxo pipefail
          git clone https://github.com/arminbiere/cadical.git "$RUNNER_TEMP/cadical"
          git -C "$RUNNER_TEMP/cadical" checkout 7b99c07f0bcab5824a5a3ce62c7066554017f641
          (cd "$RUNNER_TEMP/cadical" && ./configure && make -j2)
          git clone https://github.com/arminbiere/kissat.git "$RUNNER_TEMP/kissat"
          git -C "$RUNNER_TEMP/kissat" checkout 8af8e56f174b778aef3aa45af9f739b2a5f492c2
          (cd "$RUNNER_TEMP/kissat" && ./configure && make -j2)
          "$RUNNER_TEMP/cadical/build/cadical" --version
          "$RUNNER_TEMP/kissat/build/kissat" --version

      - name: Generate the full all-slope SAT instance
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          root="math/checkerboard/finite_certificates"
          out="construction/n${N}-p${PARITY}-k${TARGET}"
          mkdir -p "$(dirname "$out")"
          python3 "$root/generate_cnf.py" --n "$N" --parity "$PARITY" --at-least "$TARGET" \
            --cnf "$out.cnf" --metadata "$out.metadata.json" | tee "$out.generator.log"

      - name: Solve independently and check both models
        shell: bash
        env:
          N: ${{ matrix.n }}
          PARITY: ${{ matrix.parity }}
          TARGET: ${{ matrix.target }}
        run: |
          set -u
          root="math/checkerboard/finite_certificates"
          stem="construction/n${N}-p${PARITY}-k${TARGET}"

          classify() {
            local code="$1" log="$2"
            if [[ "$code" == 124 ]]; then echo TIMEOUT; return; fi
            if grep -q '^s SATISFIABLE' "$log"; then echo SAT; return; fi
            if grep -q '^s UNSATISFIABLE' "$log"; then echo UNSAT; return; fi
            echo ERROR
          }

          set +e
          timeout 30m "$RUNNER_TEMP/cadical/build/cadical" "$stem.cnf" > "$stem.cadical.log" 2>&1
          cadical_code=$?
          timeout 30m "$RUNNER_TEMP/kissat/build/kissat" "$stem.cnf" > "$stem.kissat.log" 2>&1
          kissat_code=$?
          set -e
          cadical_status="$(classify "$cadical_code" "$stem.cadical.log")"
          kissat_status="$(classify "$kissat_code" "$stem.kissat.log")"
          printf 'solver\tstatus\texit_code\nCaDiCaL\t%s\t%s\nKissat\t%s\t%s\n' \
            "$cadical_status" "$cadical_code" "$kissat_status" "$kissat_code" | tee "$stem.results.tsv"

          # A timeout, UNKNOWN output, or solver error is deliberately no result.
          [[ "$cadical_status" == SAT ]]
          [[ "$kissat_status" == SAT ]]
          python3 "$root/check_model.py" --metadata "$stem.metadata.json" --solver-output "$stem.cadical.log" \
            --write-coordinates "$stem.cadical.model.json" | tee "$stem.cadical.check.log"
          python3 "$root/check_model.py" --metadata "$stem.metadata.json" --solver-output "$stem.kissat.log" \
            --write-coordinates "$stem.kissat.model.json" | tee "$stem.kissat.check.log"
          sha256sum "$stem.cnf" "$stem.metadata.json" "$stem.cadical.model.json" "$stem.kissat.model.json" \
            | tee "$stem.sha256"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkerboard-construction-n${{ matrix.n }}-p${{ matrix.parity }}
          path: construction/
          if-no-files-found: error
