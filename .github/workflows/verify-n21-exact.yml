name: Verify checkerboard n21 exact Lean theorem

on:
  pull_request:
    paths:
      - "proofs/lean/Checkerboard/**"
      - ".github/workflows/verify-n21-exact.yml"

permissions:
  contents: read

jobs:
  verify-n21:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Reject unfinished shortcuts
        working-directory: proofs/lean/Checkerboard
        run: |
          ! grep -RnE '^[[:space:]]*(sorry|admit|native_decide|axiom|opaque)([[:space:]]|$)' Checkerboard/Model.lean Checkerboard/Finite21Lower.lean Checkerboard/N21Profiles.lean Checkerboard/N21Boolean.lean Checkerboard/N21Exact.lean
      - name: Resolve pinned Mathlib
        working-directory: proofs/lean/Checkerboard
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Checkerboard
        run: lake exe cache get
      - name: Compile exact n21 theorem module
        working-directory: proofs/lean/Checkerboard
        run: lake env lean Checkerboard/N21Exact.lean 2>&1 | tee n21-build.log
      - name: Print and audit axioms
        working-directory: proofs/lean/Checkerboard
        run: |
          cat > N21AxiomAudit.lean <<'EOF'
          import Checkerboard.N21Exact
          #print axioms Checkerboard.exact_n21_p0
          #print axioms Checkerboard.exact_n21_p1
          EOF
          lake env lean N21AxiomAudit.lean 2>&1 | tee n21-axioms.log
          ! grep -q 'sorryAx' n21-axioms.log
