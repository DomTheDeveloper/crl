name: Bernstein cut patch Lean audit

on:
  push:
    branches:
      - formal/bernstein-cut-patch-saturation-v4
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-cut-patch-audit-v2.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-cut-patch-audit-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-cut-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build full library
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake build BernsteinObstacle 2>&1 | tee cut-patch-build.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Audit cut-patch endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean CutPatchSaturationAudit.lean 2>&1 | tee cut-patch-axioms.log
          if grep -q 'sorryAx' cut-patch-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.card_mul_le_sum_of_le' cut-patch-axioms.log
          grep -F 'BernsteinObstacle.cutPatch_sum_energy_ge_cubic' cut-patch-axioms.log
          grep -F 'BernsteinObstacle.cutPatch_error_ge_threeHalves' cut-patch-axioms.log

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-cut-patch-audit
          path: |
            math/bernstein_obstacle/lean/cut-patch-build.log
            math/bernstein_obstacle/lean/cut-patch-axioms.log
          if-no-files-found: warn
