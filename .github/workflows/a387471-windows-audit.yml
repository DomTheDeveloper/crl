name: Exact A387471 Windows audit

on:
  push:
    branches:
      - audit/a387471-exact
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-windows-audit.yml
  pull_request:
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-windows-audit.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-a387471-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-windows:
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Cross-check finite certificate
        working-directory: proofs/lean/A387471
        run: python check_finite60.py

      - name: Install pinned Lean
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/leanprover/elan/master/elan-init.ps1 -OutFile elan-init.ps1
          & powershell -ExecutionPolicy Bypass -File .\elan-init.ps1 -y --default-toolchain none
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve dependencies and fetch cache
        working-directory: proofs/lean/A387471
        shell: pwsh
        run: |
          lake update
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          lake exe cache get
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build complete proof stack
        working-directory: proofs/lean/A387471
        shell: pwsh
        run: |
          lake build 2>&1 | Tee-Object -FilePath build-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Audit exact theorem axioms
        working-directory: proofs/lean/A387471
        shell: pwsh
        run: |
          @'
          import A387471Exact
          #check A387471.exactStatement_proved
          #print axioms A387471.grid_sine_classification_proved
          #print axioms A387471.solutionTriples_eq_candidateSet
          #print axioms A387471.exactStatement_proved
          '@ | Set-Content -Encoding utf8 AuditExactWindows.lean
          lake env lean AuditExactWindows.lean 2>&1 | Tee-Object -FilePath axioms-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (Select-String -Path axioms-windows.log -Pattern 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce') { exit 1 }

      - name: Upload exact transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-windows-audit
          path: |
            proofs/lean/A387471/build-windows.log
            proofs/lean/A387471/axioms-windows.log
          if-no-files-found: warn
