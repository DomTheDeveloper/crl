name: Exact A387471 kernel audit

on:
  push:
    branches:
      - audit/a387471-exact
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-exact-audit.yml
  pull_request:
    paths:
      - proofs/lean/A387471/**
      - .github/workflows/a387471-exact-audit.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-a387471-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Independently cross-check the finite 60th-root certificate
        working-directory: proofs/lean/A387471
        run: python3 check_finite60.py

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Reject proof holes and unsafe shortcuts
        shell: bash
        run: |
          set -euo pipefail
          if grep -RnE --include='*.lean' \
              '^[[:space:]]*(axiom|sorry|admit|native_decide)([[:space:]]|$)|^[[:space:]]*exact[[:space:]]+native_decide([[:space:]]|$)|:= by[[:space:]]+(sorry|admit|native_decide)([[:space:]]|$)|^[[:space:]]*opaque[[:space:]]' \
              proofs/lean/A387471; then
            exit 1
          fi

      - name: Resolve dependencies and fetch cache
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -euo pipefail
          lake update
          lake exe cache get

      - name: Build the complete proof stack
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log

      - name: Audit exact theorem axioms
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -euo pipefail
          cat > AuditExact.lean <<'EOF'
          import A387471Exact
          #check A387471.exactStatement_proved
          #print axioms A387471.grid_sine_classification_proved
          #print axioms A387471.solutionTriples_eq_candidateSet
          #print axioms A387471.exactStatement_proved
          EOF
          lake env lean AuditExact.lean 2>&1 | tee -a build.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' build.log; then
            echo 'Disallowed axiom detected.' >&2
            exit 1
          fi

      - name: Upload exact transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-exact-audit
          path: proofs/lean/A387471/build.log
          if-no-files-found: warn
