name: Erdős 885 isolated mod-thirty-two descent

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_kummer_mod32.py'
      - '.github/workflows/erdos-885-mod32.yml'
  workflow_dispatch:

concurrency:
  group: erdos-885-mod32-isolated
  cancel-in-progress: true

jobs:
  mod32:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Lift all five quotient classes modulo thirty-two
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/work" -w /work sagemath/sagemath:latest \
            sage -python research/erdos885/sage_kummer_mod32.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-kummer-mod32
          path: results/kummer_mod32.json
          if-no-files-found: warn
