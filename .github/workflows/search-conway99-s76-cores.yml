name: Search Conway s76 intact cores

on:
  workflow_dispatch:
  push:
    branches:
      - agent/conway99-permutation-reduction
    paths:
      - math/conway99/src/s76_transition_orbits.py
      - math/conway99/src/s76_core_profiles.py
      - math/conway99/src/s76_intact_core_cpsat.py
      - math/conway99/src/s76_core_ci_shard.py
      - math/conway99/src/s76_core_audit_bundle.py
      - .github/workflows/search-conway99-s76-cores.yml

concurrency:
  group: conway99-s76-cores-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: mkdir -p /tmp/s76-inputs
      - run: python math/conway99/src/s76_core_profiles.py > /tmp/s76-inputs/profiles.json
      - run: |
          python - <<'PY'
          import hashlib,json
          p='/tmp/s76-inputs/profiles.json'
          data=json.load(open(p))
          assert data['PASS']
          assert data['completed_transition_orbits']==701
          assert data['S7_intact_core_orbits']==41
          print(hashlib.sha256(open(p,'rb').read()).hexdigest())
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: s76-core-inputs
          path: /tmp/s76-inputs
          retention-days: 14
          compression-level: 0

  search:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r math/conway99/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: s76-core-inputs
          path: /tmp/s76-inputs
      - run: |
          python math/conway99/src/s76_core_ci_shard.py \
            --profiles /tmp/s76-inputs/profiles.json \
            --out /tmp/s76-shard \
            --shard-index ${{ matrix.shard }} \
            --shard-count 9 \
            --time-limit 900 \
            --workers 3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: s76-core-shard-${{ matrix.shard }}
          path: /tmp/s76-shard
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

  aggregate:
    needs: search
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: s76-core-inputs
          path: /tmp/s76-inputs
      - uses: actions/download-artifact@v4
        with:
          pattern: s76-core-shard-*
          path: /tmp/s76-all
          merge-multiple: true
      - run: mkdir -p /tmp/s76-final
      - run: |
          python math/conway99/src/s76_core_audit_bundle.py \
            --profiles /tmp/s76-inputs/profiles.json \
            --results /tmp/s76-all/results \
            --witnesses /tmp/s76-all/witnesses \
            --out /tmp/s76-final/manifest.json
      - run: cp /tmp/s76-inputs/profiles.json /tmp/s76-final/
      - uses: actions/upload-artifact@v4
        with:
          name: conway99-s76-core-classification
          path: |
            /tmp/s76-final
            /tmp/s76-all/results
            /tmp/s76-all/witnesses
          retention-days: 30
          compression-level: 0
