name: Emergency cancel CRL Actions

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Cancel every other active CRL workflow run
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const currentRun = Number(process.env.GITHUB_RUN_ID);
            let page = 1;
            let cancelled = 0;
            let failed = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              for (const run of data.workflow_runs) {
                if (run.status === 'completed' || run.id === currentRun) continue;
                core.info(`Cancelling ${owner}/${repo} run ${run.id} (${run.name}, ${run.status})`);
                try {
                  await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                  cancelled += 1;
                } catch (normalError) {
                  try {
                    await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/force-cancel', {
                      owner,
                      repo,
                      run_id: run.id,
                    });
                    cancelled += 1;
                  } catch (forceError) {
                    failed += 1;
                    core.warning(`Unable to cancel run ${run.id}: ${forceError.message}`);
                  }
                }
              }

              if (data.workflow_runs.length < 100) break;
              page += 1;
            }

            core.info(`Cancellation requests accepted: ${cancelled}; failed: ${failed}`);
            await core.summary
              .addHeading('Emergency CRL Actions cancellation')
              .addList([`Accepted: ${cancelled}`, `Failed: ${failed}`])
              .write();
