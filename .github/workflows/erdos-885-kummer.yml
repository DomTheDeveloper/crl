name: Erdős 885 compatible Kummer images

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_kummer_compat.py'
      - '.github/workflows/erdos-885-kummer.yml'
  workflow_dispatch:

jobs:
  kummer:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Pull SageMath container
        run: docker pull sagemath/sagemath:latest
      - name: Compute compatible global Kummer-image upper bound
        run: |
          mkdir -p results
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage -python research/erdos885/sage_kummer_compat.py
      - name: Show result
        if: always()
        run: cat results/kummer_compat.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-kummer-compat
          path: results/kummer_compat.json
          if-no-files-found: warn
