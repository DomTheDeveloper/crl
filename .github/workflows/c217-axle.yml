name: C217 pinned Lean closure check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'math/wowii217/lean/C217/**'
      - '.github/workflows/c217-axle.yml'

concurrency:
  group: c217-arm-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install exact Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore pinned Formal Conjectures environment
        run: |
          set -euxo pipefail
          git clone --filter=blob:none https://github.com/google-deepmind/formal-conjectures.git /tmp/formal-conjectures
          cd /tmp/formal-conjectures
          git checkout e923379e609b9d5987011a1d1f06ec22ea25cd20
          test "$(cat lean-toolchain)" = "leanprover/lean4:v4.27.0"
          lake exe cache get
          mkdir -p C217
          cp "$GITHUB_WORKSPACE"/math/wowii217/lean/C217/*.lean C217/

      - name: Compile closure stack
        run: |
          set -euxo pipefail
          cd /tmp/formal-conjectures
          for f in \
            WalkTransfer \
            ClosureIndex \
            RotationPerm \
            PathSegments \
            ClosureSurgery \
            EndpointSurgery \
            CastGraphExtra \
            PathClosure
          do
            echo "===== C217/$f.lean ====="
            lake env lean "C217/$f.lean"
          done

      - name: Audit axioms
        run: |
          set -euxo pipefail
          cd /tmp/formal-conjectures
          cat > C217/AuditCurrent.lean <<'EOF'
          import C217.PathClosure
          #print axioms C217.SimpleGraph.Walk.exists_index_of_mem_edges
          #print axioms C217.SimpleGraph.Walk.exists_closure_crossing_index
          #print axioms C217.SimpleGraph.Walk.exists_hamiltonianPath_of_left_crossing
          #print axioms C217.SimpleGraph.Walk.exists_hamiltonianPath_of_right_crossing
          #print axioms C217.SimpleGraph.Walk.exists_hamiltonianPath_of_right_endpoint
          #print axioms C217.SimpleGraph.Walk.exists_hamiltonianPath_of_left_endpoint
          #print axioms C217.SimpleGraph.traceable_of_sup_edge_traceable
          EOF
          lake env lean C217/AuditCurrent.lean | tee C217/current-axioms.log
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' C217/current-axioms.log
