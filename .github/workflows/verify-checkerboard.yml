name: Verify checkerboard Lean proofs

on:
  push:
    paths:
      - "proofs/lean/Checkerboard/**"
      - "scripts/checkerboard/**"
      - ".github/workflows/verify-checkerboard.yml"
  pull_request:
    paths:
      - "proofs/lean/Checkerboard/**"
      - "scripts/checkerboard/**"
      - ".github/workflows/verify-checkerboard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checkerboard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean-checkerboard:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install certificate generator dependency
        run: python -m pip install sympy

      - name: Generate exact certificate sources
        run: |
          python scripts/checkerboard/generate_outer_certificate.py
          python scripts/checkerboard/generate_outer_density_certificate.py
          python scripts/checkerboard/generate_outer_support_certificate.py
          python scripts/checkerboard/generate_outer_geometry_certificate.py
          python scripts/checkerboard/generate_outer_marginal_ae_certificate.py
          python scripts/checkerboard/generate_outer_projection_ae_certificate.py
          python scripts/checkerboard/generate_outer_measure_certificate.py
          python scripts/checkerboard/generate_dual_bernstein_certificate.py
          python scripts/checkerboard/generate_dual_function_identities.py

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Guard against unfinished proof markers
        working-directory: proofs/lean/Checkerboard
        run: "! grep -RnE '\\bsorry\\b|\\badmit\\b|native_decide' --include='*.lean' ."

      - name: Resolve Mathlib dependency
        working-directory: proofs/lean/Checkerboard
        run: lake update

      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Checkerboard
        run: lake exe cache get || echo "cache miss — Mathlib will build from source"

      - name: Compile LP modules
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -o pipefail
          : > build.log
          for source in \
            Checkerboard/LP/AlgebraicParameter.lean \
            Checkerboard/LP/CubicInterval.lean \
            Checkerboard/LP/CubicField.lean \
            Checkerboard/LP/PrimalParameterBounds.lean \
            Checkerboard/LP/MiddleCertificate.lean \
            Checkerboard/LP/MiddleGeometry.lean \
            Checkerboard/LP/AffineIntervalMeasure.lean \
            Checkerboard/LP/IntervalDensityMeasure.lean \
            Checkerboard/LP/DensityArithmetic.lean \
            Checkerboard/LP/MiddleTwoSegment.lean \
            Checkerboard/LP/OuterCertificateData.lean \
            Checkerboard/LP/OuterDensityCertificate.lean \
            Checkerboard/LP/OuterSupportCertificate.lean \
            Checkerboard/LP/OuterGeometryBase.lean \
            Checkerboard/LP/OuterGeometryCertificate.lean \
            Checkerboard/LP/OuterMarginalAE.lean \
            Checkerboard/LP/OuterProjectionAE.lean \
            Checkerboard/LP/OuterMeasureCertificate.lean \
            Checkerboard/LP/DualCertifiedFunctions.lean \
            Checkerboard/LP/DualFunctionIdentities.lean \
            Checkerboard/LP/DualBernsteinData.lean \
            Checkerboard/LP/FiniteModel.lean \
            Checkerboard/LP/FiniteDual.lean \
            Checkerboard/LP/ContinuumModel.lean \
            Checkerboard/LP/LimitTransfer.lean \
            Checkerboard/LP/AsymptoticSqueeze.lean
          do
            echo "=== Compiling $source ===" | tee -a build.log
            lake env lean "$source" 2>&1 | tee -a build.log
          done
          lake build 2>&1 | tee -a build.log

      - name: Reject sorryAx
        working-directory: proofs/lean/Checkerboard
        run: |
          if grep -q "sorryAx" build.log; then
            echo "::error::The build depends on sorryAx."
            exit 1
          fi

      - name: Upload generated certificates and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-lp-kernel-audit
          path: |
            math/checkerboard/lp/certificates/q_weights_exact.csv
            math/checkerboard/lp/certificates/dual_triangles_reconstructed.tsv
            math/checkerboard/lp/certificates/dual_bernstein_reconstructed.tsv
            proofs/lean/Checkerboard/Checkerboard/LP/OuterCertificateData.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterDensityCertificate.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterSupportCertificate.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterGeometryCertificate.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterMarginalAE.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterProjectionAE.lean
            proofs/lean/Checkerboard/Checkerboard/LP/OuterMeasureCertificate.lean
            proofs/lean/Checkerboard/Checkerboard/LP/DualFunctionIdentities.lean
            proofs/lean/Checkerboard/Checkerboard/LP/DualBernsteinData.lean
            proofs/lean/Checkerboard/build.log
          if-no-files-found: warn
          retention-days: 30
