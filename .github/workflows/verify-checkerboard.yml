name: Verify checkerboard Lean proofs

# One-shot queue cleanup: this skipped run cancels older runs in the same
# repository-wide concurrency group. Revert to manual-only immediately after.

on:
  push:
    branches:
      - agent/checkerboard-publication-package
    paths:
      - ".github/workflows/verify-checkerboard.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clear-stale-queue:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Stale checkerboard Lean runs cleared by concurrency."
