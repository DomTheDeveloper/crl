name: Verify checkerboard Lean proofs

# One-shot queue cleanup for the stale PR #63 run.

on:
  push:
    branches:
      - agent/checkerboard-publication-package
    paths:
      - ".github/workflows/verify-checkerboard.yml"

concurrency:
  group: checkerboard-lean-Verify checkerboard Lean proofs-refs/pull/63/merge
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clear-stale-queue:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Cleared stale checkerboard PR 63 queue entry."
