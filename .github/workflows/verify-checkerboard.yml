name: Verify checkerboard Lean proofs

on:
  push:
    paths:
      - "proofs/lean/Checkerboard/**"
      - ".github/workflows/verify-checkerboard.yml"
  pull_request:
    paths:
      - "proofs/lean/Checkerboard/**"
      - ".github/workflows/verify-checkerboard.yml"
  workflow_dispatch:

concurrency:
  group: checkerboard-lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-checkerboard:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Guard against unfinished proof markers
        working-directory: proofs/lean/Checkerboard
        run: "! grep -RnE '\\bsorry\\b|\\badmit\\b|native_decide' --include='*.lean' ."

      - name: Resolve Mathlib dependency
        working-directory: proofs/lean/Checkerboard
        run: lake update

      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Checkerboard
        run: lake exe cache get || echo "cache miss — Mathlib will build from source"

      - name: Build and kernel-check
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log

      - name: Reject sorryAx
        working-directory: proofs/lean/Checkerboard
        run: |
          if grep -q "sorryAx" build.log; then
            echo "::error::The build depends on sorryAx."
            exit 1
          fi
