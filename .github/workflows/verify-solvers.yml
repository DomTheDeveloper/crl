name: Verify solvers (JS)

# Re-checks the pure-JS engines that power the interactive site:
# the propositional-logic verifier, the number-theory explorers, and the
# exact A317940 rational computation (incl. a positivity sweep to 20000).

on:
  push:
    paths: ["math/assets/js/**", "tests/**", ".github/workflows/verify-solvers.yml"]
  pull_request:
    paths: ["math/assets/js/**", "tests/**", ".github/workflows/verify-solvers.yml"]
  workflow_dispatch:

jobs:
  solvers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run solver test suite
        run: node tests/run.mjs
      - name: A300997 finite corroboration
        run: node tests/a300997.mjs
