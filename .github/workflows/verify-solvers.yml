name: Verify solvers (JS)

# Paused from automatic PR execution while the Actions queue is being recovered.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  solvers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run solver test suite
        run: node tests/run.mjs
      - name: A300997 finite corroboration
        run: node tests/a300997.mjs
