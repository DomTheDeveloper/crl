name: Temporary WOWII 217 PR audit

on:
  pull_request:
    branches:
      - main
    paths:
      - C217/**
      - .github/workflows/tmp-wowii217-pr-audit.yml
  workflow_dispatch:

concurrency:
  group: tmp-wowii217-pr-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-slim
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone current C217 source
        run: |
          set -euxo pipefail
          git clone --branch agent/c217-closure-backport --single-branch https://github.com/DomTheDeveloper/formal-conjectures.git "$RUNNER_TEMP/formal-conjectures"
          cd "$RUNNER_TEMP/formal-conjectures"
          git rev-parse HEAD | tee "$RUNNER_TEMP/source-sha.txt"

      - name: Restore Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Build C217 source stack
        id: lean
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          lake build \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217PartialDispatcher \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217RegularCertificate \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217RegularRows \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.C217ExceptionalDispatcher \
            FormalConjecturesForMathlib.Combinatorics.SimpleGraph.GraphConjecture217Reduction \
            2>&1 | tee "$RUNNER_TEMP/c217-pr-audit.log"

      - name: Replay deterministic certificates
        id: certificate
        continue-on-error: true
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -o pipefail
          python3 scripts/c217_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-certificate.log"
          git diff --exit-code -- scripts/c217_certificate.json
          python3 scripts/c217_order_bound_certificate.py 2>&1 | tee "$RUNNER_TEMP/c217-order-certificate.log"
          git diff --exit-code -- scripts/c217_order_bound_certificate.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii217-pr-audit-logs
          path: |
            ${{ runner.temp }}/source-sha.txt
            ${{ runner.temp }}/c217-pr-audit.log
            ${{ runner.temp }}/c217-certificate.log
            ${{ runner.temp }}/c217-order-certificate.log
          compression-level: 0
          retention-days: 7

      - name: Enforce audit
        run: |
          test '${{ steps.lean.outcome }}' = success
          test '${{ steps.certificate.outcome }}' = success
          ! grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool|native_decide' "$RUNNER_TEMP/c217-pr-audit.log"
