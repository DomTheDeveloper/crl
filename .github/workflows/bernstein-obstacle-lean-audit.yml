name: Bernstein obstacle Lean audit

on:
  push:
    branches:
      - agent/bernstein-obstacle-research
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-obstacle-lean-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-obstacle-lean-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-obstacle-lean-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build formalization
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake build BernsteinObstacle 2>&1 | tee bernstein-obstacle-build.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Audit terminal theorem axioms
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee bernstein-obstacle-axioms.log
          lake env lean FaceTraceAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean SimplexFaceFieldAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean AffineBernsteinAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean ConvergenceAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          if grep -q 'sorryAx' bernstein-obstacle-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.noPenetration_after_clipping' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.clippedRecovery_localBoundaryFaceTrace_eq_zero' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexBasis_lastFace_embed' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexField_lastFace_extension' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.eval_affineBernsteinPolynomial_eq_simplexBasis' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.affineBernsteinBasis_sum_repr' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.existsUnique_bernsteinCoefficients_with_latticeValues' \
            bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.assembledVISolutions_strongConvergence_of_clippedRecoveryEnergyGap' \
            bernstein-obstacle-axioms.log

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-obstacle-lean-audit
          path: |
            math/bernstein_obstacle/lean/bernstein-obstacle-build.log
            math/bernstein_obstacle/lean/bernstein-obstacle-axioms.log
          if-no-files-found: warn
