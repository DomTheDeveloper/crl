name: Bernstein obstacle Lean audit

# Canonical exact-head audit trigger.
on:
  push:
    branches:
      - agent/bernstein-obstacle-research
      - formal/bernstein-bezier-grand-canonical
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-obstacle-lean-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-obstacle-lean-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

# Intermediate proof-development commits should not block the final audit.
# The newest run on each branch or PR ref is the exact source of truth.
concurrency:
  group: bernstein-obstacle-lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build formalization
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake build BernsteinObstacle 2>&1 | tee bernstein-obstacle-build.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Audit terminal theorem axioms
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee bernstein-obstacle-axioms.log
          lake env lean FaceTraceAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean SimplexFaceFieldAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean GeometryRecoveryAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean AffineBernsteinAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean ConvergenceAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean MovingAnalysisAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean SharpRateAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean LocalDistanceAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean GrandCanonicalAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          lake env lean ConvexGrandAudit.lean 2>&1 | tee -a bernstein-obstacle-axioms.log
          if grep -q 'sorryAx' bernstein-obstacle-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.noPenetration_after_clipping' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.clippedRecovery_localBoundaryFaceTrace_eq_zero' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexField_lastFace_extension' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexField_orientedLastFace_extension' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexSamplingRecovery_nonneg' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.clipped_orientedSimplexFaceTrace_eq_of_sharedDofs' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.eval_affineBernsteinPolynomial_eq_simplexBasis' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.affineBernsteinBasis_sum_repr' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.existsUnique_bernsteinCoefficients_with_latticeValues' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.smul_mem_convex_of_zero_mem' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.convex_pointwiseConvexConstraint' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexVectorFieldNat_mem_convex' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexVectorFieldNat_pointwise_feasible' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.convex_convexCoefficientSet' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.repaired_simplexVectorFieldNat_pointwise_feasible' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.multiplierVanishingExponent' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.grandInterfaceVanishingExponent' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.threeHalvesContactLaw_with_zero_multiplierVanishing' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.balancedContactOrderWithVanishing_equalizes' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.diagonalRecovery_minimizers_strongConvergence' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.ThresholdSobolevFEMRecoveryData.scheduledRecovery' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.AsymptoticSobolevFEMRecoveryData.moscoConverges' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.AsymptoticSobolevFEMRecoveryData.minimizers_strongConvergence' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.ThresholdSobolevFEMRecoveryData.movingObstacle_moscoConverges' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.ThresholdSobolevFEMRecoveryData.movingObstacle_minimizers_strongConvergence' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.assembledVISolutions_strongConvergence_of_clippedRecoveryEnergyGap' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.local_distance_lt_of_coefficient_neg' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.boundary_offFace_coefficient_nonneg' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.corrected_localization_and_sharp_rate' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.correctedSharpMinimizerRate_of_broken_bulk_and_multiplier' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.optimalBulkRate_of_balanced_interface' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.simplexBoxApproxNat_mem_Icc' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.BilateralBarrierEnvelopeData.moscoConverges' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.BilateralBarrierEnvelopeData.grandBarrier_mosco_and_hilbertConvergence' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.SobolevFEMRecoveryData.grandBarrier_hilbertConvergence' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.monotoneInnerCone_falk_sq' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.monotoneInnerCone_operator_core' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.monotoneInnerCone_operator_falk_sq' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.intervalIntegral_phaseLockedQuadraticSlopeEnergyDensity' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.phaseLockedQuadraticSlopeEnergy_lowerBound' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.bernsteinBezierObstacleGrandTheorem' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.bernsteinBezierObstacleGrandTheorem_quadraticContact' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.threeHalvesContactLaw' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.balancedContactOrder_equalizes' bernstein-obstacle-axioms.log

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-obstacle-lean-audit
          path: |
            math/bernstein_obstacle/lean/bernstein-obstacle-build.log
            math/bernstein_obstacle/lean/bernstein-obstacle-axioms.log
          if-no-files-found: warn
