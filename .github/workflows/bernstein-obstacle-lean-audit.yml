          grep -F 'BernsteinObstacle.AsymptoticSobolevFEMRecoveryData.bernsteinBezierObstacleGrandTheorem_consistencyLimited' bernstein-obstacle-axioms.log
          grep -F 'BernsteinObstacle.ClearanceSobolevFEMRecoveryData.bernsteinBezierObstacleGrandTheorem_realMinkowski' bernstein-obstacle-axioms.log
