name: Verify Lean proofs

# Independent kernel checks for the repository's Lean certificates.

on:
  push:
    paths: ["proofs/lean/**", ".github/workflows/verify-lean.yml"]
  pull_request:
    paths: ["proofs/lean/**", ".github/workflows/verify-lean.yml"]
  workflow_dispatch:

jobs:
  lean-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard — no sorry/admit in core sources
        run: "! grep -RnE '\\bsorry\\b|\\badmit\\b' proofs/lean/core"
      - name: Build & kernel-check core proofs
        working-directory: proofs/lean/core
        run: lake build

  lean-a317940:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard — no sorry/admit/native_decide in the proof
        run: "! grep -RnE '\\bsorry\\b|\\badmit\\b|native_decide' proofs/lean/A317940/A317940.lean"
      - name: Resolve Mathlib dependency
        working-directory: proofs/lean/A317940
        run: lake update
      - name: Fetch prebuilt Mathlib cache
        working-directory: proofs/lean/A317940
        run: lake exe cache get || echo "cache miss — Mathlib will build from source"
      - name: Build, kernel-check, and print axioms
        working-directory: proofs/lean/A317940
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log
      - name: Assert clean axiom footprint (no sorryAx)
        working-directory: proofs/lean/A317940
        run: |
          echo "----- #print axioms output -----"
          grep -iE "axioms|sorryAx|propext|Classical.choice|Quot.sound" build.log || true
          if grep -q "sorryAx" build.log; then
            echo "::error::Proof depends on sorryAx — not a real proof."; exit 1
          fi

  lean-erdos865:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out certificate wrapper
        uses: actions/checkout@v4
      - name: Check out pinned source proof
        uses: actions/checkout@v4
        with:
          repository: Jayyhk/erdos-lean
          ref: 32434b3a0859bb1e485fa7e530f38eee73a3debf
          path: external/erdos-lean
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard source and wrapper against placeholders
        run: |
          ! grep -nE '\bsorry\b|\badmit\b|^\s*axiom\b' external/erdos-lean/problems/865/Erdos865.lean
          ! grep -nE '\bsorry\b|\badmit\b|native_decide|^\s*axiom\b' proofs/lean/Erdos865/FormalConjecturesExact.lean
      - name: Resolve pinned proof dependencies
        working-directory: external/erdos-lean/problems/865
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: external/erdos-lean/problems/865
        run: lake exe cache get || echo "cache miss — building dependencies"
      - name: Build pinned source proof
        working-directory: external/erdos-lean/problems/865
        shell: bash
        run: |
          set +e
          lake build > source-build.log 2>&1
          status=$?
          echo "----- Source proof compiler tail -----"
          tail -n 140 source-build.log
          exit $status
      - name: Kernel-check exact Formal Conjectures theorem
        working-directory: external/erdos-lean/problems/865
        shell: bash
        run: |
          cp "$GITHUB_WORKSPACE/proofs/lean/Erdos865/FormalConjecturesExact.lean" .
          set +e
          lake env lean FormalConjecturesExact.lean > build.log 2>&1
          status=$?
          echo "----- Exact wrapper compiler tail -----"
          tail -n 140 build.log
          exit $status
      - name: Enforce axiom footprint
        working-directory: external/erdos-lean/problems/865
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path("build.log").read_text()
          if "sorryAx" in text:
              raise SystemExit("proof depends on sorryAx")
          match = re.search(
              r"formalConjectures_erdos_865.*?depends on axioms:\s*\[([^\]]*)\]",
              text,
              flags=re.DOTALL,
          )
          if not match:
              raise SystemExit("could not find #print axioms output")
          actual = {item.strip() for item in match.group(1).split(",") if item.strip()}
          allowed = {"propext", "Classical.choice", "Quot.sound"}
          unexpected = actual - allowed
          print("axioms:", sorted(actual))
          if unexpected:
              raise SystemExit(f"unexpected axioms: {sorted(unexpected)}")
          PY
