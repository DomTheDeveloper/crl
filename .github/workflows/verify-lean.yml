name: Verify Lean proofs

# One-shot queue cleanup for the stale PR #68 run.

on:
  push:
    branches:
      - agent/checkerboard-publication-package
    paths:
      - ".github/workflows/verify-lean.yml"

concurrency:
  group: checkerboard-lean-Verify Lean proofs-refs/pull/68/merge
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clear-stale-queue:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Cleared stale general Lean PR 68 queue entry."
