name: Verify Lean proofs

# Independent kernel checks for the Lean developments in proofs/lean.

on:
  push:
    paths: ["proofs/lean/**", ".github/workflows/verify-lean.yml"]
  pull_request:
    paths: ["proofs/lean/**", ".github/workflows/verify-lean.yml"]
  workflow_dispatch:

jobs:
  lean-core:
    if: github.base_ref != 'agent/a387471-lean-reduction'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard — no proof placeholders in core sources
        run: "! grep -RnE '(^|[[:space:]])(sorry|admit)([[:space:]]|$)' proofs/lean/core"
      - name: Build & kernel-check core proofs
        working-directory: proofs/lean/core
        run: lake build

  lean-a317940:
    if: github.base_ref != 'agent/a387471-lean-reduction'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard — no proof placeholders/native_decide
        run: "! grep -RnE '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' proofs/lean/A317940/A317940.lean"
      - name: Resolve Mathlib dependency
        working-directory: proofs/lean/A317940
        run: lake update
      - name: Fetch prebuilt Mathlib cache
        working-directory: proofs/lean/A317940
        run: lake exe cache get || echo "cache miss — Mathlib will build from source"
      - name: Build, kernel-check, and print axioms
        working-directory: proofs/lean/A317940
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log
      - name: Assert clean axiom footprint (no sorryAx)
        working-directory: proofs/lean/A317940
        run: |
          echo "----- #print axioms output -----"
          grep -iE "axioms|sorryAx|propext|Classical.choice|Quot.sound" build.log || true
          if grep -q "sorryAx" build.log; then
            echo "::error::Proof depends on sorryAx — not a real proof."; exit 1
          fi

  lean-a387471:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard — no proof placeholders/native_decide in any A387471 module
        run: "! grep -RnE --include='*.lean' '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' proofs/lean/A387471"
      - name: Resolve Mathlib dependency
        working-directory: proofs/lean/A387471
        run: lake update
      - name: Fetch prebuilt Mathlib cache
        working-directory: proofs/lean/A387471
        run: lake exe cache get || echo "cache miss — Mathlib will build from source"
      - name: Build, kernel-check, and print axioms
        working-directory: proofs/lean/A387471
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log
      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-build-log
          path: proofs/lean/A387471/build.log
          if-no-files-found: error
      - name: Assert clean axiom footprint (no sorryAx)
        working-directory: proofs/lean/A387471
        run: |
          echo "----- #print axioms output -----"
          grep -iE "axioms|sorryAx|propext|Classical.choice|Quot.sound" build.log || true
          if grep -q "sorryAx" build.log; then
            echo "::error::Proof depends on sorryAx — not a real proof."; exit 1
          fi
