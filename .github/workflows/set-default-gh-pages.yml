name: Set default branch to gh-pages

on:
  push:
    paths:
      - .github/workflows/set-default-gh-pages.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  set-default:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository default branch and publish result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            -o "$response_file" -w '%{http_code}' \
            -X PATCH "${headers[@]}" \
            -H "Content-Type: application/json" \
            --data '{"default_branch":"gh-pages"}' \
            "$api")"

          body="$(cat "$response_file")"
          result="$(jq -cn --arg status "$status" --arg body "$body" \
            --arg run "$GITHUB_RUN_ID" '{http_status:$status,response:$body,run_id:$run}')"
          encoded="$(printf '%s\n' "$result" | base64 -w 0)"

          result_url="$api/contents/branch-cleanup-default-result.json"
          existing_sha="$(curl --silent "${headers[@]}" \
            "$result_url?ref=gh-pages" | jq -r '.sha // empty')"
          payload="$(jq -cn --arg message 'Record default-branch API result' \
            --arg content "$encoded" --arg branch 'gh-pages' --arg sha "$existing_sha" \
            'if $sha == "" then {message:$message,content:$content,branch:$branch}
             else {message:$message,content:$content,branch:$branch,sha:$sha} end')"

          curl --fail-with-body --silent --show-error \
            -X PUT "${headers[@]}" -H "Content-Type: application/json" \
            --data "$payload" "$result_url" >/dev/null

          echo "HTTP status: $status"
          printf '%s\n' "$body"
          test "$status" = "200"
