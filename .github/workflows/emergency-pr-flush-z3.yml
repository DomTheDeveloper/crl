name: Emergency PR flush Z3 queue

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: Verify Z3 (SMT)
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flush-only:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Scheduler-only queue flush"
