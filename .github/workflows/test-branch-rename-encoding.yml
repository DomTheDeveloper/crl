name: Test branch rename encoding

on:
  push:
    paths:
      - .github/workflows/test-branch-rename-encoding.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test double-encoded slash branch rename
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          source_branch='tmp/branch-cleanup-v2'
          encoded_branch='tmp%252Fbranch-cleanup-v2'
          test_branch='tmp-branch-cleanup-v2-test'

          out1="$(mktemp)"
          status1="$(curl --silent --show-error -o "$out1" -w '%{http_code}' \
            -X POST "${headers[@]}" -H 'Content-Type: application/json' \
            --data "$(jq -cn --arg new_name "$test_branch" '{new_name:$new_name}')" \
            "$api/branches/$encoded_branch/rename")"
          body1="$(cat "$out1")"

          status2='not-run'
          body2=''
          if [[ "$status1" == '201' ]]; then
            out2="$(mktemp)"
            status2="$(curl --silent --show-error -o "$out2" -w '%{http_code}' \
              -X POST "${headers[@]}" -H 'Content-Type: application/json' \
              --data "$(jq -cn --arg new_name "$source_branch" '{new_name:$new_name}')" \
              "$api/branches/$test_branch/rename")"
            body2="$(cat "$out2")"
          fi

          result="$(jq -cn --arg s1 "$status1" --arg b1 "$body1" \
            --arg s2 "$status2" --arg b2 "$body2" --arg run "$GITHUB_RUN_ID" \
            '{first_status:$s1,first_response:$b1,restore_status:$s2,restore_response:$b2,run_id:$run}')"
          encoded="$(printf '%s\n' "$result" | base64 -w 0)"
          result_url="$api/contents/branch-rename-encoding-result.json"
          existing_sha="$(curl --silent "${headers[@]}" "$result_url?ref=gh-pages" | jq -r '.sha // empty')"
          payload="$(jq -cn --arg message 'Record branch rename encoding result' \
            --arg content "$encoded" --arg branch 'gh-pages' --arg sha "$existing_sha" \
            'if $sha == "" then {message:$message,content:$content,branch:$branch}
             else {message:$message,content:$content,branch:$branch,sha:$sha} end')"
          curl --fail-with-body --silent --show-error -X PUT "${headers[@]}" \
            -H 'Content-Type: application/json' --data "$payload" "$result_url" >/dev/null

          echo "First status: $status1"
          echo "$body1"
          echo "Restore status: $status2"
          echo "$body2"
          [[ "$status1" == '201' && "$status2" == '201' ]]
