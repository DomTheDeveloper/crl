name: Erdős 885 five-factor Kummer compatibility

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_kummer_compat.py'
      - 'research/erdos885/sage_kummer_five.py'
      - '.github/workflows/erdos-885-kummer-five.yml'
  workflow_dispatch:

jobs:
  five-factor:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Pull SageMath container
        run: docker pull sagemath/sagemath:latest
      - name: Compute all five compatible quotient images
        run: |
          mkdir -p results
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage -python research/erdos885/sage_kummer_five.py
      - name: Show result
        if: always()
        run: cat results/kummer_five.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-kummer-five
          path: results/kummer_five.json
          if-no-files-found: warn
