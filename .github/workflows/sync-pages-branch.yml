name: Sync and deploy GitHub Pages

on:
  push:
    branches:
      - claude/gracious-hamilton-8k6xhz
    paths-ignore:
      - ".github/**"
      - "proofs/lean/**"
      - "ci/**"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: "pages-sync"
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mirror source commit to allowed gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SOURCE_SHA="${GITHUB_SHA}"
          if gh api repos/DomTheDeveloper/crl/git/ref/heads/gh-pages --silent 2>/dev/null; then
            gh api --method PATCH repos/DomTheDeveloper/crl/git/refs/heads/gh-pages \
              -f sha="$SOURCE_SHA" -F force=true --silent
          else
            gh api --method POST repos/DomTheDeveloper/crl/git/refs \
              -f ref="refs/heads/gh-pages" -f sha="$SOURCE_SHA" --silent
          fi

      - name: Dispatch and verify Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BEFORE="$(gh run list --repo DomTheDeveloper/crl --workflow pages.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run pages.yml --repo DomTheDeveloper/crl --ref gh-pages
          for i in $(seq 1 40); do
            RUN_ID="$(gh run list --repo DomTheDeveloper/crl --workflow pages.yml --event workflow_dispatch --branch gh-pages --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [ "$RUN_ID" != "0" ] && [ "$RUN_ID" != "$BEFORE" ]; then
              gh run watch "$RUN_ID" --repo DomTheDeveloper/crl --exit-status
              exit 0
            fi
            sleep 2
          done
          echo "Pages workflow run did not appear" >&2
          exit 1

      - name: Verify CRL proof URLs
        run: |
          set -euo pipefail
          urls=(
            "https://domthedeveloper.github.io/crl/math/wowii/"
            "https://domthedeveloper.github.io/crl/math/wowii/65/"
            "https://domthedeveloper.github.io/crl/math/wowii/65/proof/GraphConjecture65Proof.lean"
            "https://domthedeveloper.github.io/crl/math/wowii/143/"
            "https://domthedeveloper.github.io/crl/math/wowii/143/proof/WOWII/GraphConjecture143ZZFinal.lean"
            "https://domthedeveloper.github.io/crl/math/wowii/160/"
            "https://domthedeveloper.github.io/crl/math/wowii/160/statement/GraphConjecture160Corrected.lean"
            "https://domthedeveloper.github.io/crl/math/wowii/322/"
            "https://domthedeveloper.github.io/crl/math/wowii/322/HUMAN_PROOF.md"
            "https://domthedeveloper.github.io/crl/math/wowii/322/proof/GraphConjecture322.lean"
          )
          for i in $(seq 1 30); do
            all_ok=1
            for url in "${urls[@]}"; do
              code="$(curl -L -sS -o /dev/null -w '%{http_code}' "$url" || true)"
              echo "$code $url"
              [ "$code" = "200" ] || all_ok=0
            done
            [ "$all_ok" = "1" ] && exit 0
            sleep 5
          done
          exit 1
