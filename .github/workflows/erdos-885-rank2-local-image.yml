name: Erdős 885 rank-two Q2 curve image

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_rank2_local_image.py'
      - '.github/workflows/erdos-885-rank2-local-image.yml'
  workflow_dispatch:

jobs:
  local-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Enumerate the rank-two quotient image over Q2
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/work" -w /work sagemath/sagemath:latest \
            sage -python research/erdos885/sage_rank2_local_image.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erdos-885-rank2-local-image
          path: results/rank2_local_image.json
          if-no-files-found: warn
