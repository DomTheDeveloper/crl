name: Force and verify CRL Pages deployment

on:
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz

permissions:
  actions: write
  contents: write
  deployments: write
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event.pull_request.head.ref == 'force-pages-deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify published source files on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for path in \
            math/wowii/index.html \
            math/wowii/65/index.html \
            math/wowii/65/proof/GraphConjecture65Proof.lean \
            math/wowii/143/index.html \
            math/wowii/143/proof/WOWII/GraphConjecture143ZZFinal.lean \
            math/wowii/160/index.html \
            math/wowii/160/statement/GraphConjecture160Corrected.lean; do
            gh api "repos/DomTheDeveloper/crl/contents/${path}?ref=main" --silent
            echo "FOUND ${path}"
          done

      - name: Resolve allowed Pages deployment branch
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api repos/DomTheDeveloper/crl/environments/github-pages
          POLICY="$(gh api repos/DomTheDeveloper/crl/environments/github-pages/deployment-branch-policies --jq '.branch_policies[0].name')"
          test -n "$POLICY"
          if [[ "gh-pages" == $POLICY ]]; then
            DEPLOY_BRANCH="gh-pages"
          elif [[ "$POLICY" != *'*'* && "$POLICY" != *'?'* ]]; then
            DEPLOY_BRANCH="$POLICY"
          else
            DEPLOY_BRANCH="${POLICY//\*/deploy}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH//\?/x}"
          fi
          echo "POLICY=${POLICY}"
          echo "DEPLOY_BRANCH=${DEPLOY_BRANCH}"
          echo "deploy_branch=${DEPLOY_BRANCH}" >> "$GITHUB_OUTPUT"

          MAIN_SHA="$(gh api repos/DomTheDeveloper/crl/git/ref/heads/main --jq '.object.sha')"
          if gh api repos/DomTheDeveloper/crl/git/ref/heads/${DEPLOY_BRANCH} --silent 2>/dev/null; then
            gh api --method PATCH repos/DomTheDeveloper/crl/git/refs/heads/${DEPLOY_BRANCH} \
              -f sha="$MAIN_SHA" -F force=true --silent
          else
            gh api --method POST repos/DomTheDeveloper/crl/git/refs \
              -f ref="refs/heads/${DEPLOY_BRANCH}" -f sha="$MAIN_SHA" --silent
          fi

      - name: Dispatch Pages workflow from allowed branch
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.deploy_branch }}
        run: |
          set -euo pipefail
          BEFORE="$(gh run list --repo DomTheDeveloper/crl --workflow pages.yml --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run pages.yml --repo DomTheDeveloper/crl --ref "$DEPLOY_BRANCH"
          for i in $(seq 1 40); do
            RUN_ID="$(gh run list --repo DomTheDeveloper/crl --workflow pages.yml --event workflow_dispatch --branch "$DEPLOY_BRANCH" --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [ "$RUN_ID" != "0" ] && [ "$RUN_ID" != "$BEFORE" ]; then
              echo "PAGES_RUN_ID=${RUN_ID}"
              gh run watch "$RUN_ID" --repo DomTheDeveloper/crl --exit-status
              gh run view "$RUN_ID" --repo DomTheDeveloper/crl --json status,conclusion,url,headSha,event
              exit 0
            fi
            sleep 2
          done
          echo "Pages workflow run did not appear" >&2
          exit 1

      - name: Verify live public URLs
        run: |
          set -euo pipefail
          urls=(
            "https://domthedeveloper.github.io/crl/math/wowii/"
            "https://domthedeveloper.github.io/crl/math/wowii/65/"
            "https://domthedeveloper.github.io/crl/math/wowii/65/proof/GraphConjecture65Proof.lean"
            "https://domthedeveloper.github.io/crl/math/wowii/143/"
            "https://domthedeveloper.github.io/crl/math/wowii/143/proof/WOWII/GraphConjecture143ZZFinal.lean"
            "https://domthedeveloper.github.io/crl/math/wowii/160/"
            "https://domthedeveloper.github.io/crl/math/wowii/160/statement/GraphConjecture160Corrected.lean"
          )
          for i in $(seq 1 30); do
            all_ok=1
            for url in "${urls[@]}"; do
              code="$(curl -L -sS -o /dev/null -w '%{http_code}' "$url" || true)"
              echo "$code $url"
              [ "$code" = "200" ] || all_ok=0
            done
            [ "$all_ok" = "1" ] && exit 0
            sleep 5
          done
          exit 1
