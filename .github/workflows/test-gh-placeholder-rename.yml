name: Test gh branch placeholder rename

on:
  push:
    paths:
      - .github/workflows/test-gh-placeholder-rename.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/branch-cleanup-v2
      - name: Rename slash branch using gh placeholder and restore it
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          original='tmp/branch-cleanup-v2'
          temporary='tmp-branch-cleanup-v2-placeholder-test'

          first_output="$(gh api --method POST \
            'repos/{owner}/{repo}/branches/{branch}/rename' \
            -f new_name="$temporary" 2>&1)"
          first_status=$?

          restore_output=''
          restore_status=99
          if [[ $first_status -eq 0 ]]; then
            restore_output="$(gh api --method POST \
              "repos/{owner}/{repo}/branches/$temporary/rename" \
              -f new_name="$original" 2>&1)"
            restore_status=$?
          fi

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          result="$(jq -cn --arg first_status "$first_status" --arg first_output "$first_output" \
            --arg restore_status "$restore_status" --arg restore_output "$restore_output" \
            --arg run "$GITHUB_RUN_ID" \
            '{first_exit:$first_status,first_response:$first_output,restore_exit:$restore_status,restore_response:$restore_output,run_id:$run}')"
          encoded="$(printf '%s\n' "$result" | base64 -w 0)"
          result_url="$api/contents/branch-rename-placeholder-result.json"
          headers=(
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          existing_sha="$(curl --silent "${headers[@]}" "$result_url?ref=gh-pages" | jq -r '.sha // empty')"
          payload="$(jq -cn --arg message 'Record gh placeholder rename result' \
            --arg content "$encoded" --arg branch 'gh-pages' --arg sha "$existing_sha" \
            'if $sha == "" then {message:$message,content:$content,branch:$branch}
             else {message:$message,content:$content,branch:$branch,sha:$sha} end')"
          curl --fail-with-body --silent --show-error -X PUT "${headers[@]}" \
            -H 'Content-Type: application/json' --data "$payload" "$result_url" >/dev/null

          echo "$result"
          [[ $first_status -eq 0 && $restore_status -eq 0 ]]
