name: Verify checkerboard LP branch

on:
  push:
    branches:
      - agent/checkerboard-lp-asymptotic-lean
    paths:
      - "proofs/lean/Checkerboard/**"
      - "scripts/checkerboard/generate_outer_certificate.py"
      - ".github/workflows/verify-checkerboard-lp-branch.yml"
  pull_request:
    paths:
      - "proofs/lean/Checkerboard/**"
      - "scripts/checkerboard/generate_outer_certificate.py"
      - ".github/workflows/verify-checkerboard-lp-branch.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checkerboard-lp-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean-checkerboard-lp:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Generate exact outer certificate sources
        run: python scripts/checkerboard/generate_outer_certificate.py

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Guard proof sources
        working-directory: proofs/lean/Checkerboard
        run: "! grep -RnE '\\bsorry\\b|\\badmit\\b|native_decide' --include='*.lean' ."

      - name: Resolve Mathlib
        working-directory: proofs/lean/Checkerboard
        run: lake update

      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Checkerboard
        run: lake exe cache get || true

      - name: Compile LP modules
        working-directory: proofs/lean/Checkerboard
        shell: bash
        run: |
          set -o pipefail
          for source in \
            Checkerboard/LP/AlgebraicParameter.lean \
            Checkerboard/LP/CubicInterval.lean \
            Checkerboard/LP/CubicField.lean \
            Checkerboard/LP/PrimalParameterBounds.lean \
            Checkerboard/LP/MiddleCertificate.lean \
            Checkerboard/LP/MiddleGeometry.lean \
            Checkerboard/LP/OuterCertificateData.lean \
            Checkerboard/LP/FiniteModel.lean \
            Checkerboard/LP/FiniteDual.lean \
            Checkerboard/LP/ContinuumModel.lean \
            Checkerboard/LP/LimitTransfer.lean \
            Checkerboard/LP/AsymptoticSqueeze.lean
          do
            lake env lean "$source" 2>&1 | tee -a lp-build.log
          done
          lake build 2>&1 | tee -a lp-build.log

      - name: Reject sorryAx
        working-directory: proofs/lean/Checkerboard
        run: "! grep -q sorryAx lp-build.log"

      - name: Upload generated exact certificate
        uses: actions/upload-artifact@v4
        with:
          name: checkerboard-outer-certificate-generated
          path: |
            math/checkerboard/lp/certificates/q_weights_exact.csv
            proofs/lean/Checkerboard/Checkerboard/LP/OuterCertificateData.lean
            proofs/lean/Checkerboard/lp-build.log
          if-no-files-found: error
