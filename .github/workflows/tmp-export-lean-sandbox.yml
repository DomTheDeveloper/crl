name: Temporary export Lean sandbox

# Triggered after the transport workflow was registered on the default branch.
on:
  push:
    branches: [tmp-lean-sandbox-bootstrap]
  pull_request:
    branches: [claude/gracious-hamilton-8k6xhz]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Install Lean toolchain manager
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clone pinned Formal Conjectures project
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch attack-fresh-formal-conjectures \
            https://github.com/DomTheDeveloper/formal-conjectures.git \
            "$RUNNER_TEMP/formal-conjectures"
      - name: Fetch binary Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get
          lean --version
          lake --version
          lake env lean FormalConjectures/WrittenOnTheWallII/GraphConjecture103.lean
      - name: Build relocatable archive
        run: |
          set -euxo pipefail
          rm -rf "$RUNNER_TEMP/formal-conjectures/.git"
          tar --zstd -cf "$RUNNER_TEMP/lean-sandbox.tar.zst" \
            -C "$HOME" .elan \
            -C "$RUNNER_TEMP" formal-conjectures
          ls -lh "$RUNNER_TEMP/lean-sandbox.tar.zst"
      - uses: actions/upload-artifact@v4
        with:
          name: lean-sandbox
          path: ${{ runner.temp }}/lean-sandbox.tar.zst
          compression-level: 0
          retention-days: 1
