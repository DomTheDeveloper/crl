name: Audit WOWII 314 Lean proof

on:
  push:
    branches:
      - agent/wowii314-proof
    paths:
      - math/wowii/314/**
      - .github/workflows/audit-wowii314.yml
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz
    paths:
      - math/wowii/314/**
      - .github/workflows/audit-wowii314.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wowii314-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out CRL proof archive
        uses: actions/checkout@v4

      - name: Check out pinned Formal Conjectures environment
        uses: actions/checkout@v4
        with:
          repository: google-deepmind/formal-conjectures
          ref: b2e608fc52d765510915a244bb69b1a2741acc3c
          path: formal-conjectures

      - name: Install Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Prepare isolated proof modules
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p formal-conjectures/WOWII
          cp math/wowii/314/proof/WOWII/*.lean formal-conjectures/WOWII/
          cat > formal-conjectures/WOWII/Audit314.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture314
          import WOWII.ZZGraphConjecture314Final

          namespace WrittenOnTheWallII.GraphConjecture314

          open Classical SimpleGraph
          variable {α : Type*} [Fintype α] [DecidableEq α]

          example [Nontrivial α]
              (G : SimpleGraph α) [DecidableRel G.Adj]
              (hG : G.Connected)
              (hTriFree : ∀ a b c : α,
                G.Adj a b → G.Adj b c → G.Adj c a → False)
              (hPath : largestInducedPathSize G ≤ 4) :
              IsWellTotallyDominated G := by
            exact conjecture314_proved G hG hTriFree hPath

          #print axioms conjecture314_proved

          end WrittenOnTheWallII.GraphConjecture314
          EOF

      - name: Reject explicit proof holes and unsafe shortcuts
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          files=(WOWII/ZZGraphConjecture314*.lean)
          if grep -InE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|^[[:space:]]*opaque[[:space:]]' "${files[@]}"; then
            echo 'Explicit proof hole or disallowed shortcut found.' >&2
            exit 1
          fi

      - name: Download Mathlib cache
        shell: bash
        working-directory: formal-conjectures
        run: lake exe cache get

      - name: Build pinned Formal Conjectures module
        shell: bash
        working-directory: formal-conjectures
        run: lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture314

      - name: Compile exact proof stack in dependency order
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          : > wowii314-build.log
          files=(
            WOWII/ZZGraphConjecture314Core.lean
            WOWII/ZZGraphConjecture314DominatingEdge.lean
            WOWII/ZZGraphConjecture314PathTree.lean
            WOWII/ZZGraphConjecture314BipartiteCommon.lean
            WOWII/ZZGraphConjecture314ChainGraph.lean
            WOWII/ZZGraphConjecture314Cycle5.lean
            WOWII/ZZGraphConjecture314Cycle5Blowup.lean
            WOWII/ZZGraphConjecture314P5Bridge.lean
            WOWII/ZZGraphConjecture314ConditionalFinal.lean
            WOWII/ZZGraphConjecture314GeodesicP5.lean
            WOWII/ZZGraphConjecture314BipartiteClassification.lean
            WOWII/ZZGraphConjecture314CycleDichotomy.lean
            WOWII/ZZGraphConjecture314C5Embedding.lean
            WOWII/ZZGraphConjecture314C5Dominates.lean
            WOWII/ZZGraphConjecture314C5Bags.lean
            WOWII/ZZGraphConjecture314C5BlowupClassification.lean
            WOWII/ZZGraphConjecture314Final.lean
          )
          for file in "${files[@]}"; do
            echo "=== Checking $file ===" | tee -a wowii314-build.log
            lake env lean "$file" 2>&1 | tee -a wowii314-build.log
          done

      - name: Verify theorem type and audit axioms
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euo pipefail
          lake env lean WOWII/Audit314.lean 2>&1 | tee wowii314-axioms.log
          if grep -q 'sorryAx' wowii314-axioms.log; then
            echo 'Audit failed: conjecture314_proved depends on sorryAx.' >&2
            exit 1
          fi
          grep -F 'conjecture314_proved' wowii314-axioms.log

      - name: Upload audit transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii314-lean-audit
          path: |
            formal-conjectures/wowii314-build.log
            formal-conjectures/wowii314-axioms.log
          if-no-files-found: warn
