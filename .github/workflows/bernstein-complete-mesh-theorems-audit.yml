name: Bernstein complete mesh theorems Lean audit

on:
  push:
    branches:
      - formal/bernstein-complete-mesh-theorems-v1
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-complete-mesh-theorems-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-complete-mesh-theorems-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-complete-mesh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build inherited library and mesh theorem modules
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build BernsteinObstacle 2>&1 | tee mesh-theorems-build.log
          lake build BernsteinObstacle.FlatInterfaceBenchmark 2>&1 | tee -a mesh-theorems-build.log
          lake build BernsteinObstacle.GenericShiftAveraging 2>&1 | tee -a mesh-theorems-build.log
          lake build BernsteinObstacle.DesignedTubularMesh 2>&1 | tee -a mesh-theorems-build.log
          lake build BernsteinObstacle.AlignedMeshObstruction 2>&1 | tee -a mesh-theorems-build.log
          lake build BernsteinObstacle.PhaseWeightedSaturation 2>&1 | tee -a mesh-theorems-build.log

      - name: Audit all mesh-instantiation endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean MeshInstantiationAudit.lean 2>&1 | tee mesh-theorems-axioms.log
          if grep -q 'sorryAx' mesh-theorems-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.flatBenchmark_sharp_sandwich' mesh-theorems-axioms.log
          grep -F 'BernsteinObstacle.goodTranslationSet_measure_lowerBound' mesh-theorems-axioms.log
          grep -F 'BernsteinObstacle.curvedFiber_phase_bounds' mesh-theorems-axioms.log
          grep -F 'BernsteinObstacle.exactRepresentability_refutes_positiveLowerBound' mesh-theorems-axioms.log
          grep -F 'BernsteinObstacle.phaseWeighted_error_ge_threeHalves_of_sum_le_sq' mesh-theorems-axioms.log

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-complete-mesh-theorems-audit
          path: |
            math/bernstein_obstacle/lean/mesh-theorems-build.log
            math/bernstein_obstacle/lean/mesh-theorems-axioms.log
          if-no-files-found: warn
