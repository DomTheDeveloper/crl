name: Erdős 885 best-curve Selmer diagnostics

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_best_selmer.py'
      - '.github/workflows/erdos-885-selmer.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selmer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - run: docker pull sagemath/sagemath:latest
      - name: Compute exact rank and 2-Selmer diagnostics
        run: |
          mkdir -p results
          chmod 777 results
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work \
            sagemath/sagemath:latest \
            sage -python research/erdos885/sage_best_selmer.py
      - if: always()
        run: cat results/best_selmer.json || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erdos-885-best-selmer
          path: results/best_selmer.json
          if-no-files-found: warn
