name: Isolated Green14 t=20 final kernel audit

on:
  push:
    branches:
      - audit/green14-fast-isolated
    paths:
      - 'ci/lean/Green14Fast/**'
      - '.github/workflows/green14-fast-isolated.yml'
  pull_request:
    paths:
      - 'ci/lean/Green14Fast/**'
      - '.github/workflows/green14-fast-isolated.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-green14-t20-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/Green14Fast
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: ci/lean/Green14Fast
        run: lake exe cache get
      - name: Build kernel-clean array bridge and t=20 theorem
        working-directory: ci/lean/Green14Fast
        shell: bash
        run: |
          set -o pipefail
          lake build '@formal_conjectures/+FormalConjectures.GreensOpenProblems.Green14ArrayCertificateBridge' \
            '@formal_conjectures/+FormalConjectures.GreensOpenProblems.Green14FastKernel20' \
            2>&1 | tee audit.log
      - name: Compile terminal audit and enforce trust base
        working-directory: ci/lean/Green14Fast
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Audit.lean 2>&1 | tee -a audit.log
          if grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' audit.log; then
            exit 1
          fi
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green14-t20-final-kernel-audit
          path: ci/lean/Green14Fast/audit.log
          if-no-files-found: warn
