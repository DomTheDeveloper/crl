name: Publish WOWII proof archive from same-repo PR

on:
  pull_request:
    branches: [claude/gracious-hamilton-8k6xhz]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'trigger-wowii-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Pages branch
        uses: actions/checkout@v4
        with:
          ref: claude/gracious-hamilton-8k6xhz
          fetch-depth: 0

      - name: Copy verified Lean artifacts
        shell: bash
        run: |
          set -euo pipefail
          SRC=2823819a49d6ec5a0f3f7711213a0358e4d136b2
          mkdir -p math/wowii/{65/{proof,statement},143/{proof/WOWII,statement},160/statement,assets}
          curl -fsSL "https://raw.githubusercontent.com/DomTheDeveloper/test-expo-app/${SRC}/WOWII/GraphConjecture65Proof.lean" -o math/wowii/65/proof/GraphConjecture65Proof.lean
          curl -fsSL "https://raw.githubusercontent.com/DomTheDeveloper/formal-conjectures/ca1384ff6e95104edbcb77c9367eeee52d5e0f05/FormalConjectures/WrittenOnTheWallII/GraphConjecture65.lean" -o math/wowii/65/statement/GraphConjecture65.lean
          for f in GraphConjecture143Proof GraphConjecture143Next GraphConjecture143Leaves GraphConjecture143Boundary GraphConjecture143CycleAttach GraphConjecture143ZZFinal; do
            curl -fsSL "https://raw.githubusercontent.com/DomTheDeveloper/test-expo-app/${SRC}/WOWII/${f}.lean" -o "math/wowii/143/proof/WOWII/${f}.lean"
          done
          curl -fsSL "https://raw.githubusercontent.com/DomTheDeveloper/formal-conjectures/b5fe9ec043ddbf45ce433312aac30d39e4d24db0/FormalConjectures/WrittenOnTheWallII/GraphConjecture143.lean" -o math/wowii/143/statement/GraphConjecture143.lean
          curl -fsSL "https://raw.githubusercontent.com/DomTheDeveloper/formal-conjectures/cfa4baa243eab2a49d555bce64e6784e1303a7be/FormalConjectures/WrittenOnTheWallII/GraphConjecture160.lean" -o math/wowii/160/statement/GraphConjecture160Corrected.lean

      - name: Build public proof pages
        shell: bash
        run: |
          cat > math/wowii/assets/style.css <<'EOF'
          :root{--bg:#0e1116;--panel:#161c27;--panel2:#1b2430;--border:#2a3545;--text:#e6edf3;--muted:#9aa8b8;--ok:#37d0a0;--warn:#f6c35a;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.62}a{color:var(--ok);text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:940px;margin:auto;padding:30px 20px 80px}.crumbs,.note,.foot{color:var(--muted);font-size:.9rem}h1{font-size:clamp(1.8rem,4.4vw,2.7rem);line-height:1.15;margin:.25em 0}.sub{font-size:1.08rem;color:var(--muted)}.badges{display:flex;gap:8px;flex-wrap:wrap;margin:15px 0}.badge{font-size:.78rem;font-weight:650;padding:4px 11px;border-radius:20px;border:1px solid var(--border)}.ok{color:var(--ok);background:rgba(55,208,160,.12)}.warn{color:var(--warn);background:rgba(246,195,90,.1)}section,.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin:18px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{margin:0}.thm,pre{font-family:var(--mono);background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--ok);border-radius:0 10px 10px 0;padding:14px 16px;overflow:auto;white-space:pre-wrap}code{font-family:var(--mono);background:rgba(127,127,127,.16);padding:.1em .35em;border-radius:5px}.files li{margin:7px 0}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid var(--border);vertical-align:top}th{color:var(--muted)}
          EOF
          cat > math/wowii/index.html <<'EOF'
          <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WOWII formal proofs — CRL</title><link rel="stylesheet" href="./assets/style.css"></head><body><main class="wrap"><div class="crumbs"><a href="../">∑ Math Proof Playground</a> › WOWII</div><h1>Written on the Wall II: formal proof archive</h1><p class="sub">Public Lean 4 proof artifacts and statement corrections supporting CRL submissions to Google DeepMind Formal Conjectures.</p><div class="grid"><article class="card"><span class="badge ok">proved · PR #4441</span><h2><a href="./65/">Conjecture 65</a></h2><p>Exact current formal statement proved, with complete downloadable Lean source.</p></article><article class="card"><span class="badge ok">proved · PR #4442</span><h2><a href="./143/">Conjecture 143</a></h2><p>Complete six-module, sorry-free Lean proof using the current second-smallest-degree invariant.</p></article><article class="card"><span class="badge warn">correction · PR #4443</span><h2><a href="./160/">Conjecture 160</a></h2><p>Historical C₄-free characteristic restored; corrected conjecture remains open.</p></article></div><p class="foot">Hosted from <a href="https://github.com/DomTheDeveloper/crl">DomTheDeveloper/crl</a>.</p></main></body></html>
          EOF
          cat > math/wowii/65/index.html <<'EOF'
          <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WOWII 65 — verified Lean proof</title><link rel="stylesheet" href="../assets/style.css"></head><body><main class="wrap"><div class="crumbs"><a href="../../">∑ Math Proof Playground</a> › <a href="../">WOWII</a> › 65</div><h1>WOWII Graph Conjecture 65</h1><p class="sub">A complete machine-checked proof of the exact current Formal Conjectures theorem.</p><div class="badges"><span class="badge ok">sorry-free Lean 4</span><span class="badge ok">focused CI passed</span><span class="badge">upstream PR #4441</span></div><section><h2>Theorem</h2><div class="thm">distMin(G,A) + ⌈distMin(G,M)/3⌉ ≤ largestInducedForestSize(G)</div></section><section><h2>Proof idea</h2><ol><li>Every nonempty proper vertex set in a connected graph has a boundary edge, so its minimum outside distance is at most one.</li><li>The minimum- and maximum-degree vertex sets are nonempty, so the left side is at most two.</li><li>Every nontrivial connected graph contains an induced two-vertex forest.</li></ol></section><section><h2>Artifacts</h2><ul class="files"><li><a href="./proof/GraphConjecture65Proof.lean">Complete Lean proof</a></li><li><a href="./statement/GraphConjecture65.lean">Submitted theorem statement</a></li><li><a href="https://github.com/google-deepmind/formal-conjectures/pull/4441">Formal Conjectures PR #4441</a></li></ul></section><p class="foot">CRL proof archive.</p></main></body></html>
          EOF
          cat > math/wowii/143/index.html <<'EOF'
          <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WOWII 143 — verified Lean proof</title><link rel="stylesheet" href="../assets/style.css"></head><body><main class="wrap"><div class="crumbs"><a href="../../">∑ Math Proof Playground</a> › <a href="../">WOWII</a> › 143</div><h1>WOWII Graph Conjecture 143</h1><p class="sub">A complete modular Lean 4 proof of the exact current theorem.</p><div class="badges"><span class="badge ok">six-module sorry-free proof</span><span class="badge ok">focused CI passed</span><span class="badge">upstream PR #4442</span></div><section><h2>Theorem</h2><div class="thm">girth(G) + 1 ≤ largestInducedTreeSize(G) · secondSmallestDegree(G)</div></section><section><h2>Proof decomposition</h2><ol><li>Acyclic case.</li><li>Cyclic case with second-smallest degree at least two.</li><li>Exceptional second-smallest-degree-one case via two leaves, a maximum induced tree, and an external chord attachment.</li></ol></section><section><h2>Lean modules</h2><ul class="files"><li><a href="./proof/WOWII/GraphConjecture143Proof.lean">GraphConjecture143Proof.lean</a></li><li><a href="./proof/WOWII/GraphConjecture143Next.lean">GraphConjecture143Next.lean</a></li><li><a href="./proof/WOWII/GraphConjecture143Leaves.lean">GraphConjecture143Leaves.lean</a></li><li><a href="./proof/WOWII/GraphConjecture143Boundary.lean">GraphConjecture143Boundary.lean</a></li><li><a href="./proof/WOWII/GraphConjecture143CycleAttach.lean">GraphConjecture143CycleAttach.lean</a></li><li><a href="./proof/WOWII/GraphConjecture143ZZFinal.lean">Final theorem assembly</a></li><li><a href="./statement/GraphConjecture143.lean">Submitted theorem statement</a></li><li><a href="https://github.com/google-deepmind/formal-conjectures/pull/4442">Formal Conjectures PR #4442</a></li></ul></section><p class="foot">CRL proof archive.</p></main></body></html>
          EOF
          cat > math/wowii/160/index.html <<'EOF'
          <!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WOWII 160 — statement correction</title><link rel="stylesheet" href="../assets/style.css"></head><body><main class="wrap"><div class="crumbs"><a href="../../">∑ Math Proof Playground</a> › <a href="../">WOWII</a> › 160</div><h1>WOWII Graph Conjecture 160</h1><p class="sub">Correction of the Formal Conjectures statement to match the historical C₄-free characteristic.</p><div class="badges"><span class="badge warn">statement correction</span><span class="badge">corrected theorem remains open</span><span class="badge">upstream PR #4443</span></div><section><h2>Correction</h2><p><code>χ_C₄(G)</code> is one when G contains no four-cycle subgraph and zero otherwise; the cycle need not be induced.</p></section><section><h2>Artifact</h2><ul class="files"><li><a href="./statement/GraphConjecture160Corrected.lean">Corrected Lean statement</a></li><li><a href="https://github.com/google-deepmind/formal-conjectures/issues/4423">Issue #4423</a></li><li><a href="https://github.com/google-deepmind/formal-conjectures/pull/4443">Correction PR #4443</a></li></ul></section><p class="foot">This page does not claim the corrected conjecture is solved.</p></main></body></html>
          EOF
          cat > math/wowii/65/verification.json <<'EOF'
          {"problem":"WOWII Graph Conjecture 65","status":"proved exact current formal statement","source_commit":"2823819a49d6ec5a0f3f7711213a0358e4d136b2","focused_ci_run":29466675291,"upstream_pr":4441,"sorry_free":true}
          EOF
          cat > math/wowii/143/verification.json <<'EOF'
          {"problem":"WOWII Graph Conjecture 143","status":"proved exact current formal statement","source_commit":"2823819a49d6ec5a0f3f7711213a0358e4d136b2","focused_ci_run":29466675291,"upstream_pr":4442,"sorry_free":true,"modules":6}
          EOF
          cat > math/wowii/160/verification.json <<'EOF'
          {"problem":"WOWII Graph Conjecture 160","status":"historical statement corrected; conjecture remains open","upstream_issue":4423,"upstream_pr":4443,"solved":false}
          EOF

      - name: Commit archive to CRL Pages branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add math/wowii
          git commit -m "Publish WOWII proof archive on GitHub Pages" || exit 0
          git push origin HEAD:claude/gracious-hamilton-8k6xhz
