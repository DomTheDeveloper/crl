name: Diagnose A387471 nonminimal branch

on:
  pull_request:
    paths:
      - ".github/workflows/verify-a387471-minimal.yml"

permissions:
  contents: read

concurrency:
  group: diagnose-a387471-nonminimal
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Check out repaired proof
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/crl
          ref: 83d6b0b9497a7bbdd62bcaa7a3e329574ca01bbf
          path: campaign
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Download Mathlib cache
        working-directory: campaign/proofs/lean/A387471
        run: lake exe cache get
      - name: Build shared prerequisites
        working-directory: campaign/proofs/lean/A387471
        run: lake build A387471Ratio A387471AngleBounds A387471SixRoots A387471SineCancel
      - name: Build three-root module
        working-directory: campaign/proofs/lean/A387471
        run: lake build A387471ThreeRoots 2>&1 | tee ../../../../a387471-three-roots.log
      - name: Build pair module
        working-directory: campaign/proofs/lean/A387471
        run: lake build A387471Pairs 2>&1 | tee ../../../../a387471-pairs.log
      - name: Build labeled branches
        working-directory: campaign/proofs/lean/A387471
        run: lake build A387471PairLabels A387471TripleLabels 2>&1 | tee ../../../../a387471-labels.log
      - name: Build nonminimal theorem
        working-directory: campaign/proofs/lean/A387471
        run: lake build A387471Nonminimal 2>&1 | tee ../../../../a387471-nonminimal-only.log
      - name: Upload diagnostic transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a387471-nonminimal-diagnostic
          path: |
            a387471-three-roots.log
            a387471-pairs.log
            a387471-labels.log
            a387471-nonminimal-only.log
          if-no-files-found: warn
