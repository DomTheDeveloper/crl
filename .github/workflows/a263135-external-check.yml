name: A263135 external Lean check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a263135-external-singleton
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Formal Conjectures workbench
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: dtd/oeis-a263135-scd-scratch
          path: formal-conjectures
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore mathlib cache
        working-directory: formal-conjectures
        run: lake exe cache get
      - name: Check A263135
        working-directory: formal-conjectures
        run: lake env lean Scratch/A263135Ranks.lean
