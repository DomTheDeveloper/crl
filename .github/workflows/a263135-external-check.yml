name: A263135 ARM scratch audit

on:
  push:
    branches:
      - dtd/a263135-checker
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a263135-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - name: Checkout Formal Conjectures workbench
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: dtd/oeis-a263135-scd-scratch
          path: formal-conjectures
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Reject proof holes and unsafe shortcuts
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|Lean\.trustCompiler|Lean\.ofReduce' \
              formal-conjectures/Scratch/A263135*.lean; then
            exit 1
          fi
      - name: Fetch mathlib cache
        working-directory: formal-conjectures
        shell: bash
        run: lake exe cache get
      - name: Check terminal theorem and axioms
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          lake env lean Scratch/A263135Audit.lean 2>&1 | tee "$RUNNER_TEMP/a263135-arm-audit.log"
          ! grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' "$RUNNER_TEMP/a263135-arm-audit.log"
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a263135-arm-audit
          path: ${{ runner.temp }}/a263135-arm-audit.log
          if-no-files-found: warn
