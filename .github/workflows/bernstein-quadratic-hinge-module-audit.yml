name: Bernstein quadratic hinge module audit

on:
  push:
    branches:
      - formal/bernstein-quadratic-hinge-projection-v4
    paths:
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticIntegral.lean'
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticHingeProjection.lean'
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticHingeBestApproximation.lean'
      - 'math/bernstein_obstacle/lean/QuadraticHingeProjectionAudit.lean'
      - '.github/workflows/bernstein-quadratic-hinge-module-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticIntegral.lean'
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticHingeProjection.lean'
      - 'math/bernstein_obstacle/lean/BernsteinObstacle/QuadraticHingeBestApproximation.lean'
      - 'math/bernstein_obstacle/lean/QuadraticHingeProjectionAudit.lean'
      - '.github/workflows/bernstein-quadratic-hinge-module-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-quadratic-hinge-modules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Compile quadratic integral module
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake env lean BernsteinObstacle/QuadraticIntegral.lean 2>&1 | tee quadratic-integral.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Compile quadratic hinge projection module
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake env lean BernsteinObstacle/QuadraticHingeProjection.lean 2>&1 | tee quadratic-hinge-projection.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Compile exact best-approximation module
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set +e
          lake env lean BernsteinObstacle/QuadraticHingeBestApproximation.lean 2>&1 | tee quadratic-hinge-best.log
          code=${PIPESTATUS[0]}
          set -e
          exit "$code"

      - name: Audit exact endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean QuadraticHingeProjectionAudit.lean 2>&1 | tee quadratic-hinge-axioms.log
          if grep -q 'sorryAx' quadratic-hinge-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi

      - name: Upload module audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-quadratic-hinge-module-audit
          path: |
            math/bernstein_obstacle/lean/quadratic-integral.log
            math/bernstein_obstacle/lean/quadratic-hinge-projection.log
            math/bernstein_obstacle/lean/quadratic-hinge-best.log
            math/bernstein_obstacle/lean/quadratic-hinge-axioms.log
          if-no-files-found: warn
