name: Isolated WOWII 322 ARM64 audit

on:
  pull_request:
    paths:
      - 'ci/lean/WOWII322/**'
      - '.github/workflows/wowii322-isolated-arm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: isolated-wowii322-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Resolve exact proof dependency
        working-directory: ci/lean/WOWII322
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: ci/lean/WOWII322
        run: lake exe cache get
      - name: Compile and audit exact theorem
        working-directory: ci/lean/WOWII322
        shell: bash
        run: |
          set -o pipefail
          lake env lean Audit.lean 2>&1 | tee audit-arm.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' audit-arm.log; then
            exit 1
          fi
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii322-isolated-arm
          path: ci/lean/WOWII322/audit-arm.log
          if-no-files-found: warn
