name: Verify checkerboard n17 exact Lean theorem

on:
  pull_request:
    paths:
      - "proofs/lean/Checkerboard/**"
      - ".github/workflows/verify-n17-exact.yml"

permissions:
  contents: read

jobs:
  verify-n17:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Reject unfinished shortcuts
        working-directory: proofs/lean/Checkerboard
        run: |
          ! grep -RnE '^[[:space:]]*(sorry|admit|native_decide|axiom|opaque)([[:space:]]|$)' Checkerboard/Model.lean Checkerboard/FiniteExact.lean
      - name: Resolve pinned Mathlib
        working-directory: proofs/lean/Checkerboard
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: proofs/lean/Checkerboard
        run: lake exe cache get
      - name: Compile exact n17 theorem module
        working-directory: proofs/lean/Checkerboard
        run: lake env lean Checkerboard/FiniteExact.lean 2>&1 | tee n17-build.log
      - name: Print and audit axioms
        working-directory: proofs/lean/Checkerboard
        run: |
          cat > N17AxiomAudit.lean <<'EOF'
          import Checkerboard.FiniteExact
          #print axioms Checkerboard.exact_n17_p0
          #print axioms Checkerboard.exact_n17_p1
          EOF
          lake env lean N17AxiomAudit.lean 2>&1 | tee n17-axioms.log
          ! grep -q 'sorryAx' n17-axioms.log
          grep -q 'Checkerboard.exact_n17_p0' n17-axioms.log
          grep -q 'Checkerboard.exact_n17_p1' n17-axioms.log
