name: Temporary Lean sandbox transport

on:
  pull_request:
    branches: [claude/gracious-hamilton-8k6xhz]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-macos:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Install Lean toolchain manager
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Clone pinned Formal Conjectures project
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch attack-fresh-formal-conjectures \
            https://github.com/DomTheDeveloper/formal-conjectures.git \
            "$RUNNER_TEMP/formal-conjectures"
      - name: Fetch and unpack Mathlib cache
        working-directory: ${{ runner.temp }}/formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get
          lean --version
          lake --version
          lake env lean FormalConjectures/WrittenOnTheWallII/GraphConjecture103.lean
      - name: Download official Linux Lean distribution
        run: |
          set -euxo pipefail
          curl -fL --retry 5 \
            https://github.com/leanprover/lean4/releases/download/v4.27.0/lean-4.27.0-linux.tar.zst \
            -o "$RUNNER_TEMP/lean-linux.tar.zst"
          echo '056e2dc8564fc064a801e69f3eb18c044b9b546bc8b0e5a2c00247f8a1cb8ce6  '"$RUNNER_TEMP/lean-linux.tar.zst" | shasum -a 256 -c -
      - name: Build transport archive
        run: |
          set -euxo pipefail
          rm -rf "$RUNNER_TEMP/formal-conjectures/.git"
          brew install zstd
          tar -cf - -C "$RUNNER_TEMP" formal-conjectures lean-linux.tar.zst \
            | zstd -T0 -9 -o "$RUNNER_TEMP/lean-sandbox.tar.zst"
          ls -lh "$RUNNER_TEMP/lean-sandbox.tar.zst"
      - uses: actions/upload-artifact@v4
        with:
          name: lean-sandbox-macos-transport
          path: ${{ runner.temp }}/lean-sandbox.tar.zst
          compression-level: 0
          retention-days: 1
