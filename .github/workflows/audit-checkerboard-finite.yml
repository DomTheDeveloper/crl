name: Audit checkerboard finite artifacts

on:
  push:
    branches:
      - checkerboard-17-21-certificates
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch every preserved branch
        run: |
          set -euxo pipefail
          git fetch --all --prune '+refs/heads/*:refs/remotes/origin/*'

      - name: Inventory candidate artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit
          git for-each-ref --sort=refname --format='%(refname)' refs/remotes/origin > audit/branches.txt
          : > audit/matches.txt
          : > audit/files.txt
          while IFS= read -r ref; do
            branch="${ref#refs/remotes/origin/}"
            git ls-tree -r --name-only "$ref" | grep -Ei '(checker|ntil|no.?three|dmono|17|21|sat|smt|mip|certificate|solver|veripb|lrat|frat)' \
              | sed "s#^#${branch}\t#" >> audit/files.txt || true
            git grep -n -I -i -E '(17[[:space:]x×*_-]*17|21[[:space:]x×*_-]*21|n[[:space:]]*=[[:space:]]*17|n[[:space:]]*=[[:space:]]*21|board[^0-9]{0,12}17|board[^0-9]{0,12}21|Dmono\([^)]*(17|21))' "$ref" -- \
              ':!*.lock' ':!*.min.js' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.gif' \
              | sed "s#^#${branch}\t#" >> audit/matches.txt || true
          done < audit/branches.txt
          sort -u audit/files.txt -o audit/files.txt
          sort -u audit/matches.txt -o audit/matches.txt
          {
            echo '=== branches ==='
            cat audit/branches.txt
            echo '=== candidate files ==='
            cat audit/files.txt
            echo '=== textual matches ==='
            cat audit/matches.txt
          } | tee audit/report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checkerboard-finite-inventory
          path: audit/
          if-no-files-found: error
