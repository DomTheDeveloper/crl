name: Checkerboard exact 17 and 21 certificates

on:
  push:
    branches:
      - agent/checkerboard-exact-17-21
    paths:
      - math/checkerboard/certificates/exact-17-21/**
      - .github/workflows/checkerboard-exact-17-21.yml
  pull_request:
    branches:
      - claude/gracious-hamilton-8k6xhz
    paths:
      - math/checkerboard/certificates/exact-17-21/**
      - .github/workflows/checkerboard-exact-17-21.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install independent solvers
        working-directory: math/checkerboard/certificates/exact-17-21
        run: python -m pip install -r requirements.txt
      - name: Generate exact instances and proof artifacts
        working-directory: math/checkerboard/certificates/exact-17-21
        run: python certify.py generate
      - name: Cross-check with CP-SAT and HiGHS
        working-directory: math/checkerboard/certificates/exact-17-21
        run: python certify.py solve --seconds 120
      - name: Deterministic exact verification
        working-directory: math/checkerboard/certificates/exact-17-21
        run: python certify.py verify
      - name: Commit reproducible artifacts
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add math/checkerboard/certificates/exact-17-21/artifacts
          if git diff --cached --quiet; then
            echo 'Artifacts already reproducible and current.'
          else
            git commit -m 'Add generated exact checkerboard certificates'
            git push
          fi
