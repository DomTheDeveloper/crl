name: One-shot RNA quasi-powers Windows kernel audit

on:
  pull_request:
    paths:
      - '.github/workflows/tmp-rna-quasipowers-windows.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Check out canonical Formal Conjectures proof head
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 9facde3955b23cd397dfa010d7d9cbdb7bb6b4cc
          path: formal-conjectures
      - name: Install pinned Lean
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/leanprover/elan/master/elan-init.ps1' -OutFile "$env:RUNNER_TEMP\elan-init.ps1"
          & "$env:RUNNER_TEMP\elan-init.ps1" -y --default-toolchain none
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build and audit
        working-directory: formal-conjectures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ((Get-Content lean-toolchain -Raw).Trim() -ne 'leanprover/lean4:v4.27.0') { throw 'Unexpected Lean toolchain' }
          lake update
          lake exe cache get
          lake build RNAQuasiPowers 2>&1 | Tee-Object -FilePath rna-windows-kernel-audit.log
          lake env lean RNAQuasiPowers/AxiomAudit.lean 2>&1 | Tee-Object -FilePath rna-windows-kernel-audit.log -Append
          if (Select-String -Path rna-windows-kernel-audit.log -Pattern 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce') { throw 'Forbidden axiom detected' }
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rna-quasipowers-windows-kernel-audit
          path: formal-conjectures/rna-windows-kernel-audit.log
          if-no-files-found: warn
