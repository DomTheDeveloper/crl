name: Erdős 885 rank-two basis export

on:
  pull_request:
    paths:
      - 'research/erdos885/sage_rank2_basis.py'
      - '.github/workflows/erdos-885-rank2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-basis:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Pull SageMath container
        run: docker pull sagemath/sagemath:latest
      - name: Export certified basis and torsion
        run: |
          mkdir -p results
          chmod 777 results
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            sagemath/sagemath:latest \
            sage -python research/erdos885/sage_rank2_basis.py
      - name: Show result
        run: cat results/rank2_basis.json
      - uses: actions/upload-artifact@v4
        with:
          name: erdos-885-rank2-basis
          path: results/rank2_basis.json
