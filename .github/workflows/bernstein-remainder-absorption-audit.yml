name: Bernstein remainder absorption Lean audit

on:
  push:
    branches:
      - formal/bernstein-remainder-absorption-v1
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-remainder-absorption-audit.yml'
  pull_request:
    paths:
      - 'math/bernstein_obstacle/lean/**'
      - '.github/workflows/bernstein-remainder-absorption-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bernstein-remainder-absorption-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned mathlib cache
        working-directory: math/bernstein_obstacle/lean
        run: lake exe cache get

      - name: Build full library
        working-directory: math/bernstein_obstacle/lean
        run: lake build BernsteinObstacle

      - name: Audit remainder endpoints
        working-directory: math/bernstein_obstacle/lean
        shell: bash
        run: |
          set -euo pipefail
          lake env lean RemainderAbsorptionAudit.lean 2>&1 | tee remainder-absorption-axioms.log
          if grep -q 'sorryAx' remainder-absorption-axioms.log; then
            echo 'Unexpected sorryAx found' >&2
            exit 1
          fi
          grep -F 'BernsteinObstacle.threeHalvesLowerBound_stable_under_higherOrderRemainder' remainder-absorption-axioms.log
          grep -F 'BernsteinObstacle.threeHalvesLowerBound_stable_with_fraction' remainder-absorption-axioms.log
          grep -F 'BernsteinObstacle.freeBoundary_error_ge_half_threeHalves_of_model_remainder' remainder-absorption-axioms.log

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bernstein-remainder-absorption-audit
          path: math/bernstein_obstacle/lean/remainder-absorption-axioms.log
          if-no-files-found: warn
