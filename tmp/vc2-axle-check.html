<!doctype html>
<meta charset="utf-8">
<title>VC2 AXLE 4.27 audit</title>
<style>body{font:16px/1.4 system-ui;margin:20px}pre{white-space:pre-wrap;overflow-wrap:anywhere;font:13px/1.35 ui-monospace,monospace}</style>
<h1>VC2 AXLE 4.27 audit</h1>
<div id="status">STARTING</div>
<pre id="result"></pre>
<script type="module">
const status = document.getElementById('status');
const result = document.getElementById('result');
const topic = 'proofs-vc2-9b4df7a6e12c';
async function publish(payload) {
  const chunks = [];
  for (let i = 0; i < payload.length; i += 2800) chunks.push(payload.slice(i, i + 2800));
  if (chunks.length === 0) chunks.push('(empty response)');
  for (let i = 0; i < chunks.length; i++) {
    await fetch('https://ntfy.sh/' + topic, {
      method: 'POST',
      headers: {
        'Title': `VC2 AXLE chunk ${i + 1}/${chunks.length}`,
        'Tags': 'white_check_mark,computer'
      },
      body: chunks[i]
    });
  }
}
try {
  status.textContent = 'FETCHING SOURCE';
  const sourceResponse = await fetch('https://raw.githubusercontent.com/DomTheDeveloper/formal-conjectures/agent/solve-vc2-convex-counterexample/FormalConjectures/Other/VCDimConvexCounterexample.lean', {cache:'no-store'});
  let code = await sourceResponse.text();
  code = code.replace(
    'import FormalConjectures.Other.VCDimConvex',
    `import Mathlib\n\nopen scoped BigOperators\n\ndef HasAddVCNDimAtMost {G : Type*} [AddCommGroup G]\n    (A : Set G) (n d : ℕ) : Prop :=\n  ∀ (x : Fin n → Fin (d + 1) → G) (y : Set (Fin n → Fin (d + 1)) → G),\n    ¬ ∀ i s, y s + ∑ k, x k (i k) ∈ A ↔ i ∈ s`);
  code = code.replace('open scoped BigOperators\n\nnamespace', 'namespace');
  code = code.replaceAll('@[category research solved, AMS 5 52]\n', '');
  status.textContent = 'POSTING TO AXLE';
  const response = await fetch('https://axle.axiommath.ai/api/v1/check', {
    method: 'POST',
    headers: {'Content-Type':'application/json','X-Request-Source':'vc2-gh-pages-audit'},
    body: JSON.stringify({
      content: code,
      environment: 'lean-4.27.0',
      mathlib_options: false,
      ignore_imports: true,
      timeout_seconds: 600
    })
  });
  const text = await response.text();
  const payload = JSON.stringify({http_status: response.status, body: text});
  status.textContent = 'HTTP ' + response.status + ' DONE; PUBLISHING';
  result.textContent = payload;
  await publish(payload);
  status.textContent = 'HTTP ' + response.status + ' DONE; PUBLISHED';
  document.title = 'VC2 AXLE DONE ' + response.status;
} catch (e) {
  const payload = JSON.stringify({browser_error: String(e?.stack || e)});
  status.textContent = 'ERROR; PUBLISHING';
  result.textContent = payload;
  try { await publish(payload); } catch (_) {}
  status.textContent = 'ERROR; PUBLISHED';
  document.title = 'VC2 AXLE ERROR';
}
</script>
